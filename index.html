const dividirPorPaciente = (texto, ativos) => {
  // acha onde cada paciente cadastrado aparece no texto; corta entre eles
  const linhas = texto.split('\n');
  const marcas = []; // {pacId, nome, pos} posição (índice de linha) onde o nome aparece
  ativos.forEach(p => {
    const primeiro = nrmNome(p.nome).split(' ').filter(t => t.length > 2)[0];
    const tokens = nrmNome(p.nome).split(' ').filter(t => t.length > 2);
    for (let li = 0; li < linhas.length; li++) {
      const ln = nrmNome(linhas[li]);
      // considera "achou o nome" se >=2 tokens do nome aparecem na linha (ou 1 se nome curto)
      const need = tokens.length >= 2 ? 2 : 1;
      const hits = tokens.filter(t => ln.includes(t)).length;
      if (hits >= need) { marcas.push({ pacId: p.id, nome: p.nome, pos: li }); break; }
    }
  });
  marcas.sort((a, b) => a.pos - b.pos);
  if (marcas.length <= 1) return null; // só um (ou nenhum) paciente: fluxo normal
  // cortar o texto: cada bloco vai do nome até o próximo nome
  const blocos = marcas.map((m, idx) => {
    const ini = m.pos;
    const fim = idx + 1 < marcas.length ? marcas[idx + 1].pos : linhas.length;
    return { pacId: m.pacId, nome: m.nome, texto: linhas.slice(ini, fim).join('\n') };
  });
  return blocos;
};
const farejarDiagnosticos = (texto) => {
  const txt = ' ' + nrmNome(texto) + ' ';
  const achou = { eventos: [], comorb: [], status: [], usados: new Set() };
  ALIAS_DX.eventos.forEach(([keys, item]) => { if (keys.some(k => txt.includes(k)) && !achou.eventos.includes(item)) { achou.eventos.push(item); keys.forEach(k => { if (txt.includes(k)) achou.usados.add(k); }); } });
  for (const [keys, item] of ALIAS_DX.status) { if (keys.some(k => txt.includes(k))) { achou.status.push(item); keys.forEach(k => { if (txt.includes(k)) achou.usados.add(k); }); break; } }
  COMORBIDADES.forEach(c => {
    const base = nrmNome(c).split('/')[0].trim();
    const extras = { 'HAS': ['has ', 'hipertens'], 'DM': ['dm1', 'dm2', 'dm ', 'diabet'], 'IC': ['icc', 'insuficiencia cardiaca', 'icfer'], 'DAC': ['dac', 'coronariopat'], 'DPOC': ['dpoc'], 'Hepatopatia/cirrose': ['cirrose', 'hepatopat'], 'Doença cerebrovascular/AVE': ['avc', 'ave previo', 'cerebrovascular'] }[c] || [];
    const keys = [...extras, base.length >= 4 ? base : base + ' '];
    if (keys.some(k => txt.includes(k)) && !achou.comorb.includes(c)) { achou.comorb.push(c); keys.forEach(k => { if (txt.includes(k)) achou.usados.add(k); }); }
  });
  return achou;
};

  else if (tem('cateter', 'cateter nasal', 'cn ', 'oculos')) cat.resp = 'cateter de O2';
  else if (tem('ar ambiente', ' aa ', 'em aa')) cat.resp = 'ar ambiente';
  // padrão / dispneia
  if (tem('dispnei', 'taquipnei', 'desconfort respirat')) cat.padrao_resp = 'dispneico';
  else if (tem('eupneic')) cat.padrao_resp = 'eupneico';
  // diurese qualitativa
  if (tem('anuric', 'anuria')) cat.diurese_qual = 'anúria';
  else if (tem('oliguric', 'oliguria')) cat.diurese_qual = 'oligúria';
  else if (tem('diurese preservada', 'boa diurese')) cat.diurese_qual = 'preservada';
  if (tem('svd', 'sonda vesical', 'sonda de demora')) cat.svd = 'com SVD';
  if (tem('edema acentuad', 'anasarca', 'edema importante', 'edema +++', 'edema 4')) cat.edema = 'acentuado';
  else if (tem('edema moderad', 'edema ++', 'edema 3')) cat.edema = 'moderado';
  else if (tem('edema discret', 'edema leve', 'edema +', 'edema 1', 'edema 2')) cat.edema = 'discreto';
  else if (tem('sem edema', 'edema ausente')) cat.edema = 'ausente';
  // normotenso
  if (tem('normotens')) cat.normotenso = true;
  // numéricos (valor + fonte)
  const num = {};
  let m;
  if (m = (texto||'').match(/\b(\d{2,3})\s*[x\/]\s*(\d{2,3})\b/)) { num.pa = { v: m[1] + '/' + m[2], src: m[0] }; }
  if (m = (texto||'').match(/sat[o2 ]*[:\s]*(\d{2,3})\s*%?/i)) { num.sat = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/fio2[:\s]*(\d{2,3})/i)) { num.fio2 = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/peep[:\s]*(\d{1,2})/i)) { num.peep = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/(?:fluxo|o2)[^\d]{0,8}(\d{1,2})\s*l(?:\/min|itros)?/i)) { num.fluxoO2 = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/(?:diurese|diurou|urinou)[^\d]{0,12}(\d{3,4})\s*ml/i)) { num.diurese = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/(?:ganho|balan[cç]o|bh)[^\d]{0,10}\+?\s*(\d{3,4})/i)) { num.ganhos = { v: m[1], src: m[0].trim() }; }
  if (m = (texto||'').match(/(?:nora|noradrenalina|adrenalina|dobuta|dobutamina|vaso|vasopressina|dopa|tridil|nitro)[^\d]{0,12}(\d{1,3}(?:[.,]\d)?)\s*(?:ml|mcg)/i)) { num.dva = { v: m[0].trim(), src: m[0].trim() }; }
  // exames

};

const buscarDx = (termo, freq) => {
  const t = (termo || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
  if (t.length < 2) return [];
  const base = [...INDICE_DX, ...lerCustomDx()];
  const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  return base.filter(it => norm(it.n).includes(t))
    .sort((a, b) => {
      const fa = (freq[a.cat === 'cm' ? 'comorbidades' : 'gatilhos'] || {})[a.n] || 0;
      const fb = (freq[b.cat === 'cm' ? 'comorbidades' : 'gatilhos'] || {})[b.n] || 0;
      if (fb !== fa) return fb - fa;
      return a.n.localeCompare(b.n);
    }).slice(0, 12);
};

const dividirRelatorios = (txt) => {
  const reWA = /\[\d{1,2}\/\d{1,2}\/\d{2,4},?\s*\d{1,2}:\d{2}(?::\d{2})?\]\s*[^:\n]+:/g;
  let marcas = []; let m;
  while ((m = reWA.exec(txt)) !== null) marcas.push(m.index);
  if (marcas.length <= 1) {
    const rePac = /(?:^|\n)\s*\*?Paciente\*?\s*:/gi;
    marcas = [];
    while ((m = rePac.exec(txt)) !== null) marcas.push(m.index);
  }
  if (marcas.length <= 1) return null;
  const blocos = [];
  for (let k = 0; k < marcas.length; k++) {
    const ini = marcas[k];
    const fim = k + 1 < marcas.length ? marcas[k + 1] : txt.length;
    const b = txt.slice(ini, fim).trim();
    // só conta como relatório se tiver Paciente e (UF ou Tempo ou Evolução)
    const tl = b.toLowerCase();
    if (/paciente/.test(tl) && (/uf\s*total/.test(tl) || /tempo/.test(tl) || /evolu/.test(tl))) blocos.push(b);
  }
  return blocos.length > 1 ? blocos : null;
};
const parseRelEnf = (txt) => {
  const completo = String(txt || '');
  const assin = completo.match(/T[ée]cnic[oa]\s*[:\-][^\n]*/i);
  const corte = assin ? completo.indexOf(assin[0]) + assin[0].length : completo.length;
  const t = completo.slice(0, corte);
  const resto = completo.slice(corte).trim();
  const nPacientes = (completo.match(/Paciente\s*[:\-]/gi) || []).length;
  const pega = (re) => { const m = t.match(re); return m ? m[1].trim() : ''; };
  const nome = pega(/\*?Paciente\*?\s*[:\-]\s*(.+)/i);
  const uti = pega(/\*?Uti\*?\s*[:\-]\s*(.+)/i);
  const leito = pega(/\*?Leito\*?\s*[:\-]\s*(.+)/i);
  const data = pega(/(\d{2}\/\d{2}\/\d{4})/);
  const tempoRaw = pega(/\*?Tempo\*?\s*[:\-]\s*([\d:hH., ]+)/i);
  const tempoDig = (tempoRaw.match(/\d+[:h]?\d*/) || [''])[0].replace(/[^\d]/g, '');
  const tempo = tempoDig ? fmtDur(tempoDig.length === 1 || tempoDig.length === 2 && parseInt(tempoDig) <= 12 ? tempoDig.replace(/^0/, '') : tempoDig) : '';
  const ufTotal = pega(/Uf\s*total\*?\s*[:\-]\s*([\d.]+)/i).replace(/\./g, '');
  const ufEfetiva = pega(/Uf\s*efetiva\*?\s*[:\-]\s*([\d.]+)/i).replace(/\./g, '');
  const ini = pega(/In[ií]cio\*?\s*[:\-]\s*(\d{1,2}[:h]\d{2})/i).replace('h', ':');
  const fim = pega(/Final?\*?\s*[:\-]\s*(\d{1,2}[:h]\d{2})/i).replace('h', ':');
  let durCalc = '';
  if (ini && fim) {
    const [h1, m1] = ini.split(':').map(Number), [h2, m2] = fim.split(':').map(Number);
    let min = (h2 * 60 + m2) - (h1 * 60 + m1); if (min < 0) min += 1440;
    durCalc = Math.floor(min / 60) + ':' + String(min % 60).padStart(2, '0');
  }
  const livreM = t.match(/Evolu[çc][aã]o(?:\s+de\s+Enfermagem)?\.?\s*:?\s*([\s\S]*?)(?:T[ée]cnic[oa]|$)/i);
  const livre = livreM ? livreM[1].trim() : '';
  return { nome, uti, leito, data, tempo, ufTotal, ufEfetiva, ini, fim, durCalc, livre, temResto: resto.length > 3, multiplos: nPacientes > 1 };
};
const mapRelParaRegistro = (rc, divergencia) => {
  const L = (rc.livre || '').toLowerCase();
  const interc = [];
  if (/hipotens/.test(L)) interc.push('Hipotensão');
  if (/hipertens/.test(L)) interc.push('Hipertensão');
  if (/c[aâ]imbra/.test(L)) interc.push('Câimbras');
  if (/coagul/.test(L)) interc.push('Coagulação do circuito');
  if (/sangra/.test(L)) interc.push('Sangramento');
  if (/calafrio|febre/.test(L)) interc.push('Calafrios/febre');
  if (/rebaixa/.test(L)) interc.push('Rebaixamento');
  if (/convuls/.test(L)) interc.push('Convulsão');
  if (/n[aá]usea|v[oô]mit/.test(L)) interc.push('Náuseas/vômitos');
  if (/sem fluxo|mal fluxo|mau fluxo|vias invertidas|disfun[çc][aã]o de acesso/.test(L)) interc.push('Disfunção de acesso');
  const grave = /suspens|interromp|n[aã]o realizada|pcr/.test(L);
  let destino = null, motivo = '';
  if (grave) { destino = null; }
  else if (divergencia) {
    destino = 'parcial';
    if (/pcr/.test(L)) motivo = 'PCR';
    else if (/hipotens|instabilidade/.test(L)) motivo = 'Instabilidade hemodinâmica';
    else if (/coagul/.test(L)) motivo = 'Coagulação do circuito';
    else if (/sangra/.test(L)) motivo = 'Sangramento';
    else if (/rebaixa/.test(L)) motivo = 'Rebaixamento';
    else if (/calafrio/.test(L)) motivo = 'Calafrios/reação';
    else if (/sem fluxo|mal fluxo|mau fluxo/.test(L)) motivo = 'CDL sem fluxo';
  }
  else if (/conclu[ií]da|finalizada|encerrada/.test(L)) destino = 'conforme';
  if (!interc.length && /sem (demais |mais )?intercorr/.test(L)) interc.push('Nenhuma');
  return { destino, motivo, interc };
};
const verificarRelEnf = (c) => {
  const A = [];
  const ufT = parseFloat(c.ufTotal), ufE = parseFloat(c.ufEfetiva);
  if (!isNaN(ufT) && !isNaN(ufE) && ufE > ufT)
    A.push({ n: 'erro', m: `UF efetiva (${c.ufEfetiva}) MAIOR que a UF total (${c.ufTotal}) — impossível; provável troca na anotação.` });
  if (!isNaN(ufE) && ufE > 5000)
    A.push({ n: 'erro', m: `UF efetiva de ${c.ufEfetiva} ml é implausível — conferir dígitos.` });
  const dur = c.durCalc || c.tempo;
  if (dur) { const h = durHoras(dur); if (h < 1 || h > 8) A.push({ n: 'aviso', m: `Duração de ${dur} fora do usual (1–8h) — conferir horários.` }); }
  if (c.data) {
    const [dd, mm, aa] = c.data.split('/').map(Number);
    const dt = new Date(aa, mm - 1, dd, 12);
    const dif = Math.round((dt - new Date()) / 86400000);
    if (dif === 1) A.push({ n: 'aviso', m: `Data ${c.data} é de amanhã — se a HD virou a meia-noite, confirme que pertence ao ciclo de ontem.` });
    else if (dif > 1) A.push({ n: 'erro', m: `Data ${c.data} está no FUTURO — anotação errada.` });
    else if (dif < -3) A.push({ n: 'aviso', m: `Data ${c.data} tem mais de 3 dias — relatório antigo ou data errada (mês trocado é o erro mais comum).` });
  }
  if (!isNaN(ufE) && ufE === 0 && !isNaN(ufT) && ufT > 0)
    A.push({ n: 'aviso', m: 'UF efetiva = 0 com UF total > 0 — sessão sem retirada (intencional?) ou anotação trocada.' });
  if (c.multiplos)
    A.push({ n: 'aviso', m: 'O texto colado contém MAIS DE UM relatório — analisei apenas o primeiro. Cole um por vez.' });
  if (c.temResto)
    A.push({ n: 'texto', m: 'Mensagens após a assinatura do técnico foram IGNORADAS (respostas do grupo — podem ser de outro paciente).' });
  const palavras = [['suspens', 'sessão SUSPENSA mencionada'], ['hipotens', 'hipotensão'], ['instabilidade', 'instabilidade'], ['coagul', 'coagulação'], ['sangra', 'sangramento'], ['pcr', 'PCR'], ['calafrio', 'calafrios'], ['sem fluxo', 'CDL sem fluxo'], ['mal fluxo', 'mau fluxo do CDL'], ['vias invertidas', 'vias invertidas'], ['interromp', 'interrupção'], ['não realizada', 'não realizada'], ['encerrada precoce', 'encerramento precoce']];
  const achadas = palavras.filter(([k]) => c.livre.toLowerCase().includes(k)).map(([, r]) => r);
  if (achadas.length)
    A.push({ n: 'texto', m: 'No texto da enfermagem: ' + [...new Set(achadas)].join(' · ') + ' — confira antes de marcar o destino da sessão.' });
  return A;
};
const fmtDur = (d) => {
  d = String(d || '').replace(/\D/g, '').slice(0, 4);
  if (!d) return '';
  if (d.length === 1) return d + ':00';
  if (d.length === 2) return d[0] + ':' + d[1] + '0';
  return d.slice(0, d.length - 2) + ':' + d.slice(-2);
};
const durHoras = (s) => {
  s = String(s || '');
  if (s.includes(':')) { const [h, m] = s.split(':'); return (parseInt(h) || 0) + ((parseInt(m) || 0) / 60); }
  return parseFloat(s.replace(',', '.')) || 0;
};
const fmtDec = (v) => {
  v = String(v || '').trim();
  if (!v) return '';
  if (v.includes(',') || v.includes('.')) return v.replace('.', ',');
  if (v.length === 1) return v + ',0';
  return v[0] + ',' + v.slice(1, 3);
};

const nomeContido = (parcial, completo) => {
  const a = nrmNome(parcial).split(' ').filter(Boolean);
  const b = nrmNome(completo).split(' ').filter(Boolean);
  if (!a.length || a.length >= b.length) return false;
  let i = 0;
  for (const tk of b) { if (tk === a[i]) i++; if (i === a.length) return true; }
  return false;
};
const distEd = (a, b) => {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m || !n) return Math.max(m, n);
  let prev = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const cur = [i];
    for (let j = 1; j <= n; j++) cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
    prev = cur;
  }
  return prev[n];
};
const nomeSemelhante = (relNome, cadNome) => {
  const A = nrmNome(relNome).split(' ').filter(t => t.length > 2);
  const B = nrmNome(cadNome).split(' ').filter(t => t.length > 2);
  if (!A.length || !B.length) return 0;
  let casados = 0;
  A.forEach(ta => {
    const tol = ta.length >= 6 ? 2 : ta.length >= 4 ? 1 : 0;
    if (B.some(tb => distEd(ta, tb) <= tol)) casados++;
  });
  return casados / A.length;
};

};

  const map = { hd_hoje: ['HD HOJE', '#c0392b'], hd_amanha: ['HD AMANHÃ', '#e67e22'], conservador: ['CONSERVADOR', '#27ae60'], alta: ['ALTA', '#888'] };
  const [label, color] = map[conduta] || ['', ''];
  if (!label) return null;
  return <span style={{ ...S.badge, background: color }}>{label}</span>;
}

function FormRow({ label, children }) {

}

function Section({ title, children }) {

    <div style={S.formSection}>

const FLEX_F = { orientado:'orientada', sonolento:'sonolenta', torporoso:'torporosa', comatoso:'comatosa', confuso:'confusa', agitado:'agitada', sedado:'sedada', rebaixado:'rebaixada', 'gravíssimo':'gravíssima', eupneico:'eupneica', normotenso:'normotensa' };
const flexSexo = (txt, sexo) => {
  if (sexo !== 'F' || !txt) return txt;
  let t = txt;
  for (const k in FLEX_F) t = t.split(k).join(FLEX_F[k]);
  return t;
};

function NumPadOverlay({ pad, onChange, onClose }) {
  const [keyDown, setKeyDown] = React.useState(null);
  const fmtPA = (d) => {
    d = (d||'').replace(/\D/g, '').slice(0, 6);
    if (d.length >= 5) return d.slice(0, 3) + '/' + d.slice(3);
    if (d.length === 4) return d.slice(0, 2) + '/' + d.slice(2);
    return d;
  };
  const disp = pad.mode === 'pa' ? fmtPA(pad.value) : pad.mode === 'dur' ? (fmtDur(pad.value) || pad.value) : pad.value;
  const hintEl = pad.hint ? <div style={{ background: '#fef5e7', border: '1px solid #f0d9b5', borderRadius: 8, padding: '7px 10px', fontSize: 12.5, color: '#7a5c1e', marginBottom: 8 }}>💡 {pad.hint}</div> : null;
  const anteriorEl = (() => {
    if (pad.anterior == null || pad.anterior === '') return null;
    const ehDiur = pad.campo === 'diurese';
    let extra = null;
    if (ehDiur) {
      const at = parseFloat(String(pad.value).replace(',', '.'));
      const ant = parseFloat(String(pad.anterior).replace(',', '.'));
      if (!isNaN(at) && !isNaN(ant)) {
        const d = Math.round(at - ant);
        if (d < 0) extra = <span style={{ color: '#c0392b', fontWeight: 700 }}> · ↓ {Math.abs(d)} ml a menos</span>;
        else if (d > 0) extra = <span style={{ color: '#1d7a45', fontWeight: 700 }}> · ↑ {d} ml a mais</span>;
        else extra = <span style={{ color: '#566', fontWeight: 700 }}> · igual</span>;
      }
    }
    return <div style={{ background: '#eef2f6', border: '1px solid #d5dde5', borderRadius: 8, padding: '7px 10px', fontSize: 12.5, color: '#566', marginBottom: 8 }}>↩ {ehDiur ? 'Diurese anterior' : 'Registro anterior'}: <b>{pad.anterior}{ehDiur ? ' ml' : ''}</b>{extra}</div>;
  })();
  const press = (k) => {
    if (k === 'back') { onChange(pad.value.slice(0, -1), false); return; }
    if (k === ',') { if (pad.allowComma && !pad.value.includes(',')) onChange(pad.value + ',', false); return; }
    // primeiro dígito após abrir substitui o valor herdado (comportamento de calculadora)
    const base = pad._fresco ? '' : pad.value;
    let nv = (base + k).slice(0, pad.mode === 'pa' ? 6 : 8);
    if (pad.bicAuto && /^\d{3}$/.test(nv)) nv = nv.slice(0, 2) + ',' + nv[2];
    onChange(nv, false);
    if (pad.autoLen && nv.replace(/\D/g, '').length >= pad.autoLen) {
      pad.onSet(nv);
      if (pad.onNext) pad.onNext(); else onClose();
    }
  };
  const ok = () => { const limpo = pad.mode === 'pa' ? fmtPA(pad.value) : pad.value.replace(/^0+(?=\d)/, ''); pad.onSet(limpo); if (pad.onNext) pad.onNext(); else onClose(); };
  return (
    <div style={{ position: 'fixed', left: 0, right: 0, bottom: 0, background: 'white', boxShadow: '0 -4px 20px rgba(0,0,0,0.18)', borderRadius: '16px 16px 0 0', padding: '12px 16px 20px', zIndex: 1000, maxWidth: 480, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5 }}>{pad.label}</span>
        <span onClick={onClose} style={{ fontSize: 16, color: '#888', cursor: 'pointer', padding: 4 }}>✕</span>
      </div>
      {hintEl}
      {anteriorEl}
      <div style={{ textAlign: 'center', fontSize: 28, fontWeight: 700, color: '#1a3a5c', minHeight: 36, marginBottom: 10 }}>{disp || <span style={{ color: '#ccc' }}>—</span>}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {['1','2','3','4','5','6','7','8','9', pad.allowComma ? ',' : '', '0', 'back'].map((k, i) => k === '' ? <span key={i} /> : (
          <button key={i} onClick={() => press(k)}
            onPointerDown={() => setKeyDown(i)} onPointerUp={() => setKeyDown(null)} onPointerLeave={() => setKeyDown(null)} onPointerCancel={() => setKeyDown(null)}
            style={{ padding: '12px 0', fontSize: 20, fontWeight: 600, border: '1px solid #eee', borderRadius: 10, cursor: 'pointer', userSelect: 'none', touchAction: 'manipulation', transition: 'transform .05s, background .05s, box-shadow .05s',
              ...(keyDown === i
                ? { background: '#dce6f0', transform: 'scale(0.94)', boxShadow: 'inset 0 2px 5px rgba(0,0,0,0.18)' }
                : { background: '#fafbfc', boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }) }}>
            {k === 'back' ? '⌫' : k}
          </button>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
        <button onClick={() => onChange('')} style={{ flex: 1, padding: 12, borderRadius: 10, border: '1px solid #e0c0bc', background: '#fdf4f3', color: '#c0392b', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>C limpar</button>
        <button onClick={ok} style={{ flex: 2, padding: 12, borderRadius: 10, border: 'none', background: '#1a3a5c', color: 'white', fontWeight: 700, fontSize: 16, cursor: 'pointer' }}>OK</button>
      </div>
    </div>
  );
}

function ChipSelect({ label, options, value, onSelect, color = '#1a3a5c', herdado = false }) {
  return (
    <div style={{ padding: '10px 14px', borderBottom: '1px solid #f0f0f0' }}>
      <div style={{ fontSize: 11, color: '#999', textTransform: 'uppercase', marginBottom: 6, letterSpacing: 0.5, display: 'flex', alignItems: 'center', gap: 6 }}>
        {label}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {value && !options.includes(value) && (
          <span style={{ ...S.checkItem, fontSize: 12, background: color, color: 'white', borderColor: color }}>{value}</span>
        )}
        {options.map(o => (
          <span key={o} style={{ ...S.checkItem, fontSize: 12, ...(value === o ? { background: color, color: 'white', borderColor: color } : {}) }}
            onClick={() => onSelect(o)}>{o}</span>
        ))}
      </div>
    </div>
  );
}

function NefroApp() {
  const [view, setView] = useState('lista');
  const ehNoite = () => { const h = new Date().getHours(); return h >= 21 || h < 6; };
  // chaveNoite: identifica a "noite" atual (após meia-noite ainda é a noite que começou ontem)
  const chaveNoite = () => { const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10); };
  const [noturno, setNoturno] = useState(() => {

      const veto = JSON.parse(localStorage.getItem('nefro_noturno_veto') || 'null');

    } catch {}
    const h = new Date().getHours(); return h >= 21 || h < 6;
  });
  React.useEffect(() => { try { document.documentElement.classList.toggle('noturno', noturno); } catch {} }, [noturno]);
  React.useEffect(() => {
    const tick = () => {
      let vetoAtivo = false;
      try { const v = JSON.parse(localStorage.getItem('nefro_noturno_veto') || 'null'); vetoAtivo = v && v.noite === chaveNoite(); } catch {}
      if (!vetoAtivo) setNoturno(ehNoite());
    };
    const id = setInterval(tick, 60000);
    return () => clearInterval(id);
  }, []);
  const alternarNoturno = () => {

  const [toast, setToast] = useState(null);
  const toastRef = React.useRef(null);
  const mostrarToast = (msg) => {
    setToast(msg);
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 1600);
  };
  // EXPORTAÇÕES DE PRESCRIÇÃO (denominador do "falta alguém?")
  const dataDaAv = (avData) => dataLocalISO(avData);
  const registrarExportacao = (pacId, avData) => {
    const dISO = dataDaAv(avData);
    setPacientes(ps => ps.map(p => {
      if (p.id !== pacId) return p;
      const exps = p.prescExportadas || [];
      // 1 por paciente+data (vale a última): se já há nesse dia, atualiza o timestamp; senão, adiciona
      const semEsteDia = exps.filter(e => e.data !== dISO);
      return { ...p, prescExportadas: [...semEsteDia, { data: dISO, em: Date.now() }] };
    }));
  };
  // "FALTA ALGUÉM?" — compara prescrições exportadas vs relatórios recebidos, por data
  const faltamRelatorios = (dataISO) => {
    // pacientes que tiveram prescrição EXPORTADA naquela data
    const exportados = pacientes.filter(p => (p.prescExportadas || []).some(e => e.data === dataISO));
    // dos exportados, quais NÃO têm relatório recebido com a data da sessão correspondente
    const dataBR = dataISO.split('-').reverse().join('/');
    const faltam = exportados.filter(p => !(p.relEnf || []).some(r => (r.campos?.data || '') === dataBR));
    return { total: exportados.length, recebidos: exportados.length - faltam.length, faltam };
  };
  const ontemISO = () => { const d = new Date(Date.now() - 86400000); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };
  // CONTADOR DE RELATÓRIOS (registro por data + travas de duplicidade)
  const normRaw = (s) => (s || '').replace(/\s+/g, ' ').trim().toLowerCase();
  // todos os relatórios recebidos (de todos os pacientes), com paciente e data da sessão
  const relRecebidos = () => {
    const out = [];
    pacientes.forEach(p => (p.relEnf || []).forEach(r => {
      out.push({ pacId: p.id, pacNome: p.nome, dataSessao: r.campos?.data || '', raw: r.raw || '', criadoEm: r.criadoEm || 0 });
    }));
    return out;
  };
  // recebidos após a última zeragem (o que o contador mostra)
  const relRecebidosCiclo = () => relRecebidos().filter(r => r.criadoEm >= relZeradoEm).sort((a, b) => b.criadoEm - a.criadoEm);
  // TRAVAS: classifica um novo relatório colado. retorna {tipo, relAntigo, pacId}
  //  tipo: 'identico' (barra), 'correcao' (mesmo pac+data, texto difere → pergunta), 'novo' (aceita)
  const classificarRel = (raw, pacId, dataSessao) => {
    const nr = normRaw(raw);
    // 1) idêntico a um relatório já guardado
    for (const p of pacientes) for (const r of (p.relEnf || [])) {
      if (normRaw(r.raw) === nr && nr.length > 0) {
        // se o idêntico é do CICLO ATUAL (após o último zeramento) → duplicata real, barra
        if ((r.criadoEm || 0) >= relZeradoEm) return { tipo: 'identico', pacId: p.id };
        // se é de um ciclo ANTERIOR (antes de zerar) → revive para o ciclo atual
        return { tipo: 'reviver', pacId: p.id, relAntigo: r };
      }
    }
    // 2) mesmo paciente + mesma data da sessão, texto difere → possível correção
    if (pacId && dataSessao) {
      const p = pacientes.find(x => x.id === pacId);
      const antigo = (p?.relEnf || []).find(r => (r.campos?.data || '') === dataSessao);
      if (antigo) return { tipo: 'correcao', relAntigo: antigo, pacId };
    }
    // 3) novo
    return { tipo: 'novo', pacId };
  };
  // LEVA 2: aplica o relatório direto no paciente (sem trava campo-a-campo)
  const aplicarRelUnico = (c, raw, pacId, jaConfirmado) => {
    // DATA VIRADA: relatório com data de amanhã pode ser HD que virou a meia-noite
    if (!jaConfirmado && c.data) {
      const [dd, mm, aa] = c.data.split('/').map(Number);
      const dt = new Date(aa, mm - 1, dd, 12);
      const dif = Math.round((dt - new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate(), 12)) / 86400000);
      if (dif === 1) {
        const ontem = new Date(dt.getTime() - 86400000);
        const dataOntem = String(ontem.getDate()).padStart(2,'0') + '/' + String(ontem.getMonth()+1).padStart(2,'0') + '/' + ontem.getFullYear();
        const ok = confirm('Este relatório tem data de ' + c.data + ' (amanhã).\n\nA HD virou a meia-noite ou foi feita no dia seguinte por logística, mas pertence ao ciclo de ' + dataOntem + '?\n\nOK = receber no ciclo de ' + dataOntem + '\nCancelar = não aplicar');
        if (!ok) { mostrarToast('Não aplicado'); return; }
        c = { ...c, data: dataOntem }; // associa ao ciclo de ontem
      }
    }
    // TRAVAS de duplicidade
    if (!jaConfirmado) {
      const cls = classificarRel(raw, pacId, c.data || '');
      if (cls.tipo === 'reviver') {
        // relatório idêntico de um ciclo anterior (antes do zeramento): traz para o ciclo atual
        // atualiza data/campos com os do relatório reenviado (pode ter data diferente do registro antigo)
        const idAntigo = cls.relAntigo?.id;
        setPacientes(ps => ps.map(p => p.id === cls.pacId ? { ...p, relEnf: (p.relEnf || []).map(r => r.id === idAntigo ? { ...r, campos: c, raw, criadoEm: Date.now() } : r) } : p));
        const prev = pacientes.find(p => p.id === cls.pacId);
        mostrarToast('✓ Relatório reativado no ciclo atual' + (prev ? ' (' + prev.nome + ')' : ''));
        return;
      }
      if (cls.tipo === 'identico') {
        const pdup = pacientes.find(p => p.id === cls.pacId);
        mostrarToast('⛔ Relatório idêntico já recebido neste ciclo' + (pdup ? ' (' + pdup.nome + ')' : ''));
        return;
      }
      if (cls.tipo === 'correcao') {
        const okCorr = confirm('Já existe um relatório deste paciente nesta data (' + (c.data || '') + '), com texto diferente.\n\nÉ uma CORREÇÃO do anterior?\n\nOK = substituir o anterior\nCancelar = não aplicar (verifique se a data está certa)');
        if (!okCorr) { mostrarToast('Não aplicado — verifique a data'); return; }
        // remover o relatório antigo daquele paciente/data antes de aplicar o corrigido
        setPacientes(ps => ps.map(p => p.id === pacId ? { ...p, relEnf: (p.relEnf || []).filter(r => (r.campos?.data || '') !== (c.data || '')) } : p));
      }
    }
    const pac = pacientes.find(p => p.id === pacId);
    let divergencia = null, presc = null;
    if (pac) {
      const avsP = avaliacoes[pac.id] || [];
      const dataISO = c.data ? c.data.split('/').reverse().join('-') : null;
      presc = avsP.find(a => a.conduta === 'hd_hoje' && (!dataISO || dataLocalISO(a.data) === dataISO)) || avsP.find(a => a.conduta === 'hd_hoje');
      if (presc) {
        const ufPresc = (parseFloat(presc.uf_hd) || 0) + (parseFloat(presc.uf_isolada) || 0);
        const ufObt = parseFloat(c.ufEfetiva);
        const tPresc = durHoras(presc.hd_dur || presc.hd_horas);
        const tObt = durHoras(c.durCalc || c.tempo);
        const difs = [];
        if (ufPresc && !isNaN(ufObt) && ufObt < ufPresc - 100) difs.push(`UF ${ufObt}<${ufPresc}`);
        if (tPresc && tObt && tObt < tPresc - 0.2) difs.push(`tempo ${c.durCalc || c.tempo}<${presc.hd_dur || presc.hd_horas}`);
        if (difs.length) divergencia = difs.join(' · ');
      }
    }
    const novoRel = { id: 'rel_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), criadoEm: Date.now(), campos: c, raw: raw, usadoEm: null, divergencia: divergencia || null };
    const rawL = (raw || '').toLowerCase();
    const acessoDet = /\bfav\b|f\.a\.v/.test(rawL) ? 'FAV' : /\bcdl\b|cateter|cat\u00e9ter|permcath|shilley|duplo l[u\u00fa]men/.test(rawL) ? 'CDL' : null;
    if (acessoDet && presc && presc.acesso !== acessoDet) {
      setAvaliacoes(prev => ({ ...prev, [pacId]: (prev[pacId] || []).map(a => a.id === presc.id ? { ...a, acesso: acessoDet } : a) }));
    }
    setPacientes(ps => ps.map(p => p.id === pacId ? { ...p, relEnf: [novoRel, ...(p.relEnf || [])].slice(0, 10), updatedAt: Date.now() } : p));
    // alertas NÃO-TRAVANTES (toast)
    const avisos = [];
    if (divergencia) avisos.push('Divergência: ' + divergencia);
    if (pac && c.nome && nrmNome(pac.nome) !== nrmNome(c.nome) && nomeSemelhante(pac.nome, c.nome) >= 0.6) avisos.push('Nome difere do cadastro — confira');
    if (acessoDet && presc && presc.acesso !== acessoDet) avisos.push('Acesso: ' + acessoDet);
    mostrarToast('✓ Relatório aplicado' + (avisos.length ? ' ⚠ ' + avisos.join(' | ') : ' a ' + (pac?.nome || '')));
  };

  function importarDados(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.pacientes) { alert('Arquivo inválido.'); return; }
        const qtd = d.pacientes.length;
        if (confirm(`Importar ${qtd} paciente(s) mesclando com os atuais? Pacientes existentes são mantidos; em coincidências vale o registro mais recente.`)) {
          // vencedor por paciente: o lado com updatedAt mais recente
          const recencia = p => p.updatedAt || 0;
          const novosVence = {};
          const mapaPac = {};
          pacientes.forEach(p => { mapaPac[p.id] = p; });
          d.pacientes.forEach(p => {
            if (!mapaPac[p.id] || recencia(p) >= recencia(mapaPac[p.id])) { mapaPac[p.id] = p; novosVence[p.id] = true; }
          });
          const pacMerged = Object.values(mapaPac);

          const avMerged = { ...avaliacoes };
          const dia = a => { try { return dataLocalISO(a.data); } catch { return String(a.data); } };
          Object.entries(d.avaliacoes || {}).forEach(([pid, avsImp]) => {
            const atuais = avMerged[pid] || [];
            const porDia = {};
            atuais.forEach(a => { porDia[dia(a)] = a; });
            (avsImp || []).forEach(a => {
              const k = dia(a);
              if (!porDia[k] || novosVence[pid]) porDia[k] = a; // coincidência de dia: vale o lado do paciente mais recente
            });
            avMerged[pid] = Object.values(porDia).sort((x, y) => new Date(y.data) - new Date(x.data));
          });

          setPacientes(pacMerged);
          setAvaliacoes(avMerged);
          const lixMap = {};
          lixeira.forEach(p => { lixMap[p.id] = p; });
          (d.lixeira || []).forEach(p => { if (!lixMap[p.id]) lixMap[p.id] = p; });
          const pacIds = new Set(pacMerged.map(p => p.id));
          setLixeira(Object.values(lixMap).filter(p => !pacIds.has(p.id)));
          const homs = [];
          pacMerged.forEach((p, i) => pacMerged.slice(i + 1).forEach(q => {

              <textarea value={previaTxt} onChange={e => setPrevia(e.target.value)}
                style={{ padding: 14, overflowY: 'auto', flex: 1, fontFamily: 'monospace', fontSize: 12.5, color: '#222', lineHeight: 1.5, border: 'none', outline: 'none', resize: 'none', width: '100%', boxSizing: 'border-box' }} />
              <div style={{ fontSize: 11, color: '#aaa', padding: '0 14px 4px' }}>Você pode editar o texto acima — a edição vale só para este envio.</div>
              <div style={{ display: 'flex', gap: 8, padding: 12, borderTop: '1px solid #e3e8ee' }}>
                <button style={{ ...S.btn, flex: 1, background: 'white', color: '#888', border: '1px solid #ddd' }} onClick={() => setPrevia(null)}>cancelar</button>
                <button style={{ ...S.btn, flex: 2, background: '#27ae60', color: 'white', fontWeight: 700 }} onClick={() => compartilharPanorama(previaTxt)}>📤 Compartilhar</button>
              </div>
            </div>
          </div>
        )}
        <div style={S.header}>
          <h1 style={S.h1}>Resumo</h1>
          <span style={{ fontSize: 12.5, color: 'rgba(255,255,255,0.6)', fontWeight: 500, whiteSpace: 'nowrap' }}>{fmtDataSem(avV.data)}</span><IconeCasa onClick={() => sairPerguntando()} />

        </div>
        {_diasAv.length > 1 && (
          <div style={{ margin: '8px 16px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 8px', background: _folheando ? '#fff8e1' : '#eef4fb', border: '1px solid ' + (_folheando ? '#e0c068' : '#b9d2ee'), borderRadius: 8 }}>
            <button onClick={() => setDiaFolheado(d => Math.min(_diasAv.length - 1 - _idxHoje, d + 1))}
              disabled={_idxMostrar >= _diasAv.length - 1}
              style={{ background: 'none', border: 'none', fontSize: 22, color: _idxMostrar >= _diasAv.length - 1 ? '#ccc' : '#1a3a5c', cursor: 'pointer', padding: '0 12px', fontWeight: 700 }}>‹</button>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: _folheando ? '#8a6d00' : '#1a3a5c', textAlign: 'center' }}>
              {(() => { const d = _idxMostrar - _idxHoje; return d === 0 ? 'hoje' : d === 1 ? 'ontem' : d === 2 ? 'anteontem' : 'há ' + d + ' dias'; })()}
              <span style={{ display: 'block', fontSize: 10.5, fontWeight: 400, opacity: 0.7 }}>{fmtDataSem(avV.data)}</span>
            </span>
            <button onClick={() => setDiaFolheado(d => Math.max(-_idxHoje, d - 1))}
              disabled={_idxMostrar <= 0}
              style={{ background: 'none', border: 'none', fontSize: 22, color: _idxMostrar <= 0 ? '#ccc' : '#1a3a5c', cursor: 'pointer', padding: '0 12px', fontWeight: 700 }}>›</button>
          </div>
        )}
        {!_folheando && previaTxt == null && <button onClick={copiarPanorama}
          style={{ position: 'fixed', right: 16, bottom: 'calc(84px + env(safe-area-inset-bottom, 0px))', zIndex: 400, padding: '14px 18px', borderRadius: 28, border: 'none', background: copiado ? '#27ae60' : '#1a3a5c', color: 'white', fontWeight: 700, fontSize: 14.5, cursor: 'pointer', boxShadow: '0 4px 14px rgba(0,0,0,0.35)' }}>
          {copiado ? '✓ Enviado' : '📤 Compartilhar'}
        </button>}
        <div style={{ padding: 16, paddingBottom: 90 }}>
          {!modoConsulta && !_folheando && (() => {
            const pend = pendenciasAv(avV);
            const graves = pend.filter(x => x.grave), avisos = pend.filter(x => !x.grave);
            return (
              <div style={{ ...S.card, marginBottom: 12, border: graves.length ? '1.5px solid #e8c8c4' : '1.5px solid #bfe3cd' }}>
                <div style={{ ...S.cardHeader, background: graves.length ? '#c0392b' : '#1d7a45' }}>
                  {graves.length ? `⚠ Auditoria — ${graves.length} pendência${graves.length > 1 ? 's' : ''}` : '✓ Auditoria — sem pendências'}
                </div>
                <div style={{ padding: graves.length + avisos.length ? '6px 14px' : '10px 14px', fontSize: 13.5 }}>
                  {graves.map((x, i) => (
                    <div key={'g' + i} style={{ padding: '8px 0', borderBottom: '1px solid #f5e3e0', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
                      <span onClick={() => { setModoConsulta(false); if (x.ctx) setSubCtx(x.ctx); if (x.sub) setSubRot(x.sub); if (x.v === 'conduta') setSubCond(x.id === 'conduta' ? 'dec' : 'presc'); setView(x.v); }}
                        style={{ color: '#c0392b', fontWeight: 700, cursor: 'pointer', flex: 1 }}>● {x.rot} <span style={{ color: '#999', fontWeight: 400 }}>· resolver ▸</span></span>
                      {x.destravavel && <span onClick={() => {
                          const s = prompt('Destravar "' + x.rot + '" — dado não disponível. Senha:');
                          if (s === null) return;
                          if (s !== '8453') { alert('Senha incorreta.'); return; }
                          setAvAtual(a => ({ ...a, destravadas: { ...(a.destravadas || {}), [x.id]: true } }));
                        }} style={{ fontSize: 12, color: '#8a6d3b', border: '1px solid #e8cfa8', borderRadius: 6, padding: '3px 8px', whiteSpace: 'nowrap' }}>🔓 destravar</span>}
                    </div>
                  ))}
                  {avisos.map((x, i) => (
                    <div key={'a' + i} onClick={() => { setModoConsulta(false); if (x.ctx) setSubCtx(x.ctx); if (x.sub) setSubRot(x.sub); if (x.v === 'conduta') setSubCond(x.id === 'conduta' ? 'dec' : 'presc'); setView(x.v); }}
                      style={{ padding: '8px 0', color: '#8a6d3b', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', fontStyle: x.carimbo ? 'italic' : 'normal' }}>
                      <span>○ {x.rot}</span><span style={{ color: '#bbb' }}>ver ▸</span>
                    </div>
                  ))}
                  {!graves.length && !avisos.length && <div style={{ color: '#1d7a45' }}>Registro completo — pronto para concluir.</div>}
                </div>
              </div>
            );
          })()}
          {!modoConsulta && !_folheando && (
            <div onClick={() => { setModoConsulta(false); const o = origemResumo || { v: 'roteiro', sub: 'estado' }; setSubRot(o.sub === 'beira' ? 'estado' : (o.sub || 'estado')); setView(o.v || 'roteiro'); }}
              style={{ textAlign: 'center', fontSize: 13, color: '#1a3a5c', fontWeight: 600, marginBottom: 12, cursor: 'pointer' }}>✎ continuar editando ▸</div>
          )}
          <div style={{ marginBottom: 12, padding: '12px 14px', background: '#1a3a5c', color: 'white', borderRadius: 10 }}>
            <div style={{ fontSize: 18, fontWeight: 700 }}>{pacAtual.nome}</div>
            <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>
              {pacAtual.idade && `${pacAtual.idade}a · `}{pacAtual.sexo && `${pacAtual.sexo} · `}{pacAtual.uti && `UTI ${pacAtual.uti}`}{pacAtual.leito && ` · Leito ${pacAtual.leito}`}
            </div>
            <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>{pacAtual.status}</div>
          </div>


          {(((pacAtual.comorbidades || []).length > 0) || ((pacAtual.gatilhos || []).length > 0)) && (
            <Bloco ir="eventos" titulo="Contexto clínico">
              {(pacAtual.comorbidades || []).length > 0 && <Item k="Comorbidades" v={[...pacAtual.comorbidades, pacAtual.comorbidades_outras].filter(Boolean).join(', ')} />}
              {(pacAtual.gatilhos || []).length > 0 && <Item k="Eventos agudos" v={[...pacAtual.gatilhos, pacAtual.gatilhos_outros].filter(Boolean).join(', ')} />}
            </Bloco>
          )}

          <Bloco ir="roteiro" titulo="Beira leito">
            <Item k="Estado geral" v={avV.eg} />
            <Item k="Consciência" v={avV.consciencia} />
            <Item k="Respiração" v={[avV.padrao_resp, avV.resp].filter(Boolean).join(", ") + (avV.fio2 ? ` · FiO2 ${avV.fio2}%` : '') + (avV.peep ? ` · PEEP ${avV.peep}` : '') + (avV.fluxoO2 ? ` · ${avV.fluxoO2}L/min` : '')} />
            <Item k="SatO2" v={avV.sat_nd ? '' : avV.sat_bem ? 'saturando bem' : avV.sat} />
            <Item k={avV.pai ? 'PA (PAI)' : avV.pani ? 'PA (PANI)' : 'PA'} v={avV.normotenso && !avV.pa && !avV.pam ? 'normotenso' : (avV.pai ? avV.pam : avV.pa)} />
            <Item k="Drogas vasoativas" v={dvasTxt} />
            <Item k="Edema" v={avV.edema} />
          </Bloco>

          <Bloco ir="roteiro" titulo="BH & Diurético">
            <Item k="Ganhos" v={avV.ganhos ? `${avV.ganhos} ml` : ''} />
            <Item k="Diurese" v={avV.diurese ? `${avV.diurese} ml${avV.bh_parcial && avV.bh_horas ? ` (parcial ${avV.bh_horas}h)` : ''}` : (avV.diurese_qual || '')} />
            <Item k="Diurético (em uso)" v={(avV.diureticos||[]).length ? avV.diureticos.map(d => d + ((avV.diur_doses||{})[d] ? ' ' + avV.diur_doses[d] : '')).join(' · ') : (avV.semFuro ? 'sem furosemida' : '')} />
            <Item k="SVD" v={avV.svd} />
            <Item k="Diuréticos" v={diurTxt} />
          </Bloco>

          <Bloco ir="roteiro" titulo="Laboratório (hoje)">
            {avV.semExames && <div style={{ fontStyle: 'italic', color: '#888', marginBottom: 6 }}>Sem exames hoje</div>}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
              {[['Ureia','ureia'],['Creat','creat'],['Na','sodio'],['K','pot'],['Bic','bic'],['Cai','ca'],['Mg','mg'],['P','p']].map(([lbl, key]) => {
                const v = L[`${key}_hoje`]; const n = num(v);
                if (v == null || v === '') return null;
                const c = labCrit(key, n);
                return <span key={key} style={{ fontWeight: c ? 700 : 400, color: c ? '#c0392b' : '#333' }}>{lbl} <b>{v}</b></span>;
              })}
            </div>
          </Bloco>

          {(avV.parecer_modelos || []).length > 0 && (
            <Bloco ir="conduta" titulo="Parecer pré-operatório">
              {avV.parecer_modelos.map(id => {
                const mod = PARECER_MODELOS.find(([mid]) => mid === id);
                let t = mod ? mod[1] : '';
                if ((id === 'alto_risco' || id === 'otimizar_urg') && avV.parecer_obs) t += ' ' + avV.parecer_obs;
                return t ? <div key={id} style={{ marginBottom: 6, lineHeight: 1.4 }}>{t}</div> : null;
              })}
            </Bloco>
          )}

          
          {(avV.conduta === 'hd_hoje' || avV.conduta === 'hd_amanha') && !avV.hd_nao_realizada && (() => {
            const p = avV;
            const itens = [];
            const push = (k, v) => { if (v !== undefined && v !== null && String(v).trim() !== '' && String(v).trim() !== 'sem') itens.push([k, v]); };
            push('Duração', p.hd_dur || p.hd_horas ? `${p.hd_dur || p.hd_horas}h` : '');
            push('Fluxo de sangue', p.fluxo_sangue ? `${p.fluxo_sangue} ml/min` : '');
            push('Fluxo do banho', p.fluxo_banho ? `${p.fluxo_banho} ml/min` : '');
            push('Dialisato Na', p.dialisato_sodio);
            push('Dialisato temp', p.dialisato_temp ? `${p.dialisato_temp}°C` : '');
            push('Dialisato bic', p.dialisato_bic);
            const antic = p.anticoag && p.anticoag !== 'sem' ? [p.anticoag, p.heparina_bolus ? `bolus ${p.heparina_bolus}` : '', p.heparina_taxa ? `${p.heparina_taxa}` : ''].filter(Boolean).join(' · ') : (p.anticoag === 'sem' ? 'sem anticoagulação' : '');
            push('Anticoagulação', antic);
            push('Cateter', p.cateter);
            push('Priming', p.priming);
            push('Lavagens', p.lavagens);
            if (!itens.length) return null;
            return (
              <Bloco titulo="Parâmetros da diálise">
                {itens.map(([k, v], idx) => <Item key={idx} k={k} v={v} />)}
              </Bloco>
            );
          })()}

          {(avV.ultima_hd_data || avV.tempo_obtido || avV.uf_obtida) && (
<Bloco ir="roteiro" titulo="Última HD">
            <Item k="1ª HD" v={pacAtual.dataPrimeiraHD} />
            <Item k="Data da sessão" v={avV.ultima_hd_data} />
            <Item k="Acesso" v={avV.acesso} />
            <Item k="Sessão" v={avV.hd_destino === 'conforme' ? 'conforme prescrito' : avV.hd_destino === 'cancelada' ? 'não realizada' + (avV.hd_canc_motivo ? ' — ' + avV.hd_canc_motivo : '') : avV.hd_destino === 'parcial' ? 'parcial' + (avV.hd_parcial_motivo ? ' — ' + avV.hd_parcial_motivo : '') : ''} />
            <Item k="Tempo obtido" v={avV.tempo_obtido ? `${avV.tempo_obtido}h` : ''} />
            <Item k="UF obtida" v={avV.uf_obtida ? `${avV.uf_obtida} ml` : ''} />
            <Item k="Anticoagulação" v={avV.anticoag_hd} />
            <Item k="Intercorrências" v={(Array.isArray(avV.interc) ? avV.interc : []).join(', ')} />
          </Bloco>
          )}

          {(avV.med_revisar || []).length > 0 && (
            <Bloco ir="conduta" titulo="Medicamentos a revisar">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {avV.med_revisar.map(m => <span key={m} style={{ ...S.badge, background: '#c0392b' }}>{m}</span>)}
              </div>
            </Bloco>
          )}

          <div style={{ ...S.card, marginBottom: 12, border: '2px solid #1a3a5c' }}>
            <div style={{ ...S.cardHeader, background: '#1a3a5c', color: 'white' }}>Conduta</div>
            <div style={{ padding: 14, fontSize: 14, lineHeight: 1.7 }}>
              <Item k="Decisão" v={{ hd_hoje: 'HD HOJE', hd_amanha: 'HD AMANHÃ', conservador: 'CONSERVADOR' }[avV.conduta]} />
              {avV.conduta === 'hd_hoje' && (
                <div style={{ marginTop: 4 }}>
                  {avV.prioridade === 'sim' && <div style={{ color: '#c0392b', fontWeight: 700 }}>⚠ Sessão URGENTE</div>}
                  <Item k="Duração" v={(avV.hd_dur || avV.hd_horas) ? `${avV.hd_dur || avV.hd_horas}h` : ''} />
                  <Item k="Fluxos" v={`${avV.fluxo_sangue || '200'} / ${avV.fluxo_banho || '300'}`} />
                  <Item k="UF efetiva" v={((num(avV.uf_hd) || 0) + (num(avV.uf_isolada) || 0)) + ' ml'} />
                </div>
              )}
              {(() => {
                const aj = avV.aj_diur || {};
                const nomeAj = aj.droga === 'susp_furo' ? 'suspender furosemida'
                  : aj.droga ? `${({furo_amp:'Furosemida',furo_cp:'Furosemida',espiro:'Espironolactona',hctz:'Hidroclorotiazida'})[aj.droga]} ${aj.n || '?'}${aj.droga === 'furo_amp' ? 'amp' : 'cp'} ${aj.int || ''}`.trim() : '';
                const detVol = (avV.cond_vol || []).filter(c => c !== 'Ajustar diurético' || !nomeAj).map(c => {
                  if ((c === 'Reposição volêmica' || c === 'Expansão com fluidos') && avV.fluido_tipo) {
                    const prep = avV.fluido_tipo === 'SF 0,45%' ? ' (preparo 500 ml: SG 5% 500 ml + NaCl 20% 11 ml)'
                      : avV.fluido_tipo === 'SF 0,225% (1/4)' ? ' (preparo 500 ml: SG 5% 500 ml + NaCl 20% 5,5 ml)'
                      : avV.fluido_tipo === 'SF 3%' ? ' (preparo 500 ml: SF 0,9% 445 ml + NaCl 20% 55 ml)' : '';
                    return `${c}: ${avV.fluido_ml || '?'} ml de ${avV.fluido_tipo}${prep}`;
                  }
                  return c;
                });
                const detOutras = (avV.cond_outras_sel || []).map(c => c === 'Troca de diluições' && avV.troca_diluicoes ? `Troca de diluições → ${avV.troca_diluicoes}` : c);
                return (<>
                  {nomeAj && <Item k="Ajuste de diurético" v={`dose atual: ${diurTxt || 'sem diurético'} → ajustar para: ${nomeAj}`} />}
                  {detVol.length > 0 && <Item k="Volemia" v={detVol.join('; ')} />}
                  {(avV.cond_eletr || []).length > 0 && <Item k="Eletrólitos" v={(avV.cond_eletr || []).join(', ')} />}
                  {detOutras.length > 0 && <Item k="Outras" v={detOutras.join('; ')} />}
                  {(pacAtual.atbs || []).length > 0 && <Item k="Antibióticos" v={(pacAtual.atbs || []).join(', ')} />}
                  {(avV.cond_alertas || []).map((c, ix) => <Item key={'al'+ix} k="Conduta de alerta" v={c} />)}
                </>);
              })()}
              <Item k="Conclusão" v={{ acompanhamento: 'Segue em acompanhamento', alta_nefro: 'Alta da nefrologia', alta_hosp: 'Alta hospitalar', paliativo: 'Cuidados paliativos', obito: 'Óbito' }[avV.conclusao]} />
            </div>
          </div>
        </div>

        <div style={S.bottomActions}>
          <button style={{ ...S.btn, background: '#f0f0f0', flex: '0 0 auto', padding: '12px 14px' }} onClick={() => setView('roteiro')}>‹</button>
          <button style={{ ...S.btn, background: copiado ? '#1a3a5c' : '#27ae60', color: 'white' }} onClick={copiarPanorama}>
            {copiado ? '✓ Copiado' : '📋 Copiar p/ prontuário'}
          </button>
          {avV.conduta?.startsWith('hd') && (
            <button style={{ ...S.btn, background: '#c0392b', color: 'white' }} onClick={() => setView('prescricao')}>Prescrição</button>
          )}
        </div>

        <RodapeNav salvarSair={(!_folheando && !modoConsulta) ? (() => concluirOuAuditar('conduta')) : null} direita="◂ Última tela" onDireita={() => { setDiaFolheado(0); setModoConsulta(false); const o = origemResumo || { v: 'roteiro', sub: 'estado' }; setSubRot(o.sub === 'beira' ? 'estado' : (o.sub || 'estado')); setView(o.v || 'roteiro'); }} />
      </div>
    );
  }

  return <div style={{ padding: 40, textAlign: 'center', color: '#888' }}>Carregando...</div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NefroApp />);
</script>
</body>
</html>
