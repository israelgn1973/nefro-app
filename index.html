<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#0E6E68" />
<title>Avaliação · plantão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{ --bg:#DBE8DD; --ink:#16282C; --ink2:#54675E; --line:#CBD9CE; --teal:#0E6E68; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  .wrap{ max-width:560px; margin:0 auto; padding:16px 14px 44px; }
  .eyebrow{ font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink2); font-weight:700; display:flex; align-items:center; gap:8px; margin:4px 2px 12px; }
  .ver{ font-size:11px; color:#9fb0a6; font-weight:600; }
  .pcard{ background:var(--teal); color:#fff; border-radius:14px; padding:14px 16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.12); }
  .pname{ font-size:18px; font-weight:700; line-height:1.2; }
  .psub{ font-size:13px; opacity:.85; margin-top:3px; min-height:16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px 14px 14px; margin-bottom:12px; }
  .ghead{ font-size:14px; font-weight:700; color:var(--ink); margin:2px 0 10px; }
  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink2); margin-bottom:5px; font-weight:600; }
  .field input, .field textarea{ width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:16px; color:var(--ink); background:#fff; font-family:inherit; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(14,110,104,.12); }
  .field textarea{ resize:vertical; line-height:1.4; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ border:1px solid var(--line); border-radius:999px; padding:7px 12px; font-size:13px; background:#fff; color:var(--ink); cursor:pointer; user-select:none; -webkit-user-select:none; }
  .chip.on{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .preview .ptext{ white-space:pre-wrap; word-break:break-word; background:#F4F8F5; border:1px solid var(--line); border-radius:10px; padding:12px; font-size:14px; line-height:1.5; color:var(--ink); margin:0 0 10px; font-family:inherit; min-height:40px; }
  .copybtn{ width:100%; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:700; background:var(--teal); color:#fff; cursor:pointer; }
  .copybtn:active{ opacity:.85; }
  .foot{ font-size:12px; color:var(--ink2); text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

function readRx(){
  try{
    const h = location.hash.slice(1);
    if(!h) return null;
    return JSON.parse(decodeURIComponent(escape(atob(h))));
  }catch(e){ return null; }
}
const DEMO = { n:"Maria Aparecida da Silva", id:"72", st:"UTI Adulto", lt:"08", sx:"F" };
const P = readRx() || DEMO;
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
const FEM = { 'gravíssimo':'gravíssima', 'consciente e orientado':'consciente e orientada', 'sonolento':'sonolenta', 'torporoso':'torporosa', 'comatoso':'comatosa', 'confuso/agitado':'confusa/agitada', 'sedado':'sedada', 'rebaixado':'rebaixada', 'eupneico':'eupneica', 'dispneico':'dispneica' };
const flex = (t, fem) => (fem && FEM[t]) ? FEM[t] : t;

const SUP_VM = ["VM por cânula orotraqueal", "VM por traqueostomia"];        // ventilação invasiva
const SUP_FIO2 = ["VNI", "VM por cânula orotraqueal", "VM por traqueostomia"]; // usam FiO2/PEEP
const SUP_FLUXO = ["cateter de O₂", "máscara de O₂", "máscara não reinalante", "tenda traqueal"]; // usam fluxo
const FAIXA = { ur:[5,400], cr:[0.2,25], na:[100,180], pot:[1.5,9], hco3:[5,45], fio2:[21,100], peep:[0,25], fluxo:[0,60] };
const normDec = s => (s || "").replace(".", ",");
const clamp100 = s => { const n = parseFloat(String(s).replace(",", ".")); return (isFinite(n) && n > 100) ? "100" : s; };
const xform = (k, val) => { let s = normDec(val); if(k === "fio2" || k === "sat") s = clamp100(s); return s; };
const implausivel = (k, val) => { const f = FAIXA[k]; if(!f || !val) return false; const n = parseFloat(String(val).replace(",", ".")); return isFinite(n) && (n < f[0] || n > f[1]); };

const DVAS = ["Noradrenalina","Vasopressina","Adrenalina","Dobutamina","Nitroglicerina","Nitroprussiato","Azul de metileno"];

const BLOCOS = [
  { g:"🛏️ Estado", fields:[
    { k:"eg",   l:"Estado geral", t:"chip", opts:["estável","grave","gravíssimo"] },
    { k:"cons", l:"Consciência",  t:"chip", opts:["consciente e orientado","sonolento","torporoso","comatoso","confuso/agitado","sedado","sedação suspensa","rebaixado"] },
    { k:"sang", l:"Sangramento",  t:"sang" },
  ]},
  { g:"🫁 Resp", fields:[
    { k:"presp", l:"Padrão respiratório", t:"chip", opts:["eupneico","dispneico"] },
    { k:"sup",   l:"Suporte / via",       t:"chip", opts:["ar ambiente","cateter de O₂","máscara de O₂","máscara não reinalante","VNI","VM por cânula orotraqueal","VM por traqueostomia","tenda traqueal"] },
    { k:"fio2",  l:"FiO₂",                t:"num",  ph:"% · ex. 40" },
    { k:"peep",  l:"PEEP",                t:"num",  ph:"ex. 5" },
    { k:"fluxo", l:"Fluxo O₂ (L/min)",    t:"num",  ph:"ex. 3" },
    { k:"sat",   l:"SatO₂",               t:"sat" },
  ]},
  { g:"💉 PA / DVA", fields:[
    { k:"pa",  l:"PA / PAM", t:"text", ph:"120/80 · PAM 75" },
    { k:"dva", l:"DVAs",     t:"dva" },
  ]},
  { g:"💧 Balanço", fields:[
    { k:"ganhos",  l:"Ganhos",  t:"num",  ph:"ml · ex. 2000" },
    { k:"diurese", l:"Diurese", t:"diurese" },
    { k:"edema",   l:"Edema",   t:"chip", opts:["ausente","discreto","moderado","acentuado"] },
    { k:"svd",     l:"SVD",     t:"chip", opts:["com","sem"] },
  ]},
  { g:"🧪 Exames de hoje", grid:true, fields:[
    { k:"ur",   l:"Ureia",       t:"num", ph:"mg/dL" },
    { k:"cr",   l:"Creatinina",  t:"num", ph:"mg/dL" },
    { k:"na",   l:"Sódio",       t:"num", ph:"mEq/L" },
    { k:"pot",  l:"Potássio",    t:"num", ph:"mEq/L" },
    { k:"hco3", l:"Bicarbonato", t:"num", ph:"mEq/L" },
  ]},
];

function Chips({ opts, value, onPick }){
  return (
    <div className="chips">
      {opts.map(o => (
        <span key={o} className={"chip" + (value === o ? " on" : "")} onClick={() => onPick(value === o ? "" : o)}>{o}</span>
      ))}
    </div>
  );
}

function App(){
  const [v, setV] = useState({});
  const [plant, setPlant] = useState("");
  const [obs, setObs] = useState("");
  const linkSx = (P.sx || '').toString().toUpperCase().startsWith('F') ? 'F' : (P.sx ? 'M' : '');
  const [sexo, setSexo] = useState(linkSx || 'M');
  const [copied, setCopied] = useState(false);
  const set = (k, val) => setV(o => ({ ...o, [k]: val }));

  const txt = useMemo(() => {
    const g = k => (v[k] || "").trim();
    const fem = sexo === "F";
    // estado + consciência
    const est = [flex(v.eg, fem), flex(v.cons, fem)].filter(Boolean).join(", ");
    // sangramento
    let sang = "";
    if(v.sang === "ativo") sang = "com sangramento ativo" + (g("sang_sitio") ? " (" + g("sang_sitio") + ")" : "");
    else if(v.sang === "não") sang = "sem sangramento";
    // respiração — padrão some em VM; FiO2/PEEP/fluxo conforme a via
    const ehVM = SUP_VM.includes(v.sup);
    const usaFio2 = SUP_FIO2.includes(v.sup), usaFluxo = SUP_FLUXO.includes(v.sup);
    let resp = "";
    const prSel = !ehVM && v.presp;
    const pr = prSel ? flex(v.presp, fem) : "";
    if(prSel && v.sup) resp = pr + " em " + v.sup;
    else if(prSel) resp = pr;
    else if(v.sup) resp = "em " + v.sup;
    const vent = [];
    if(usaFio2 && g("fio2")) vent.push("FiO2 " + g("fio2"));
    if(usaFio2 && g("peep")) vent.push("PEEP " + g("peep"));
    if(usaFluxo && g("fluxo")) vent.push("fluxo " + g("fluxo") + " L/min");
    if(vent.length) resp += (resp ? " " : "") + "(" + vent.join(", ") + ")";
    // SatO2
    let sat = "";
    if(v.sat_flag === "saturando bem") sat = "saturando bem";
    else if(v.sat_flag === "ND") sat = "SatO2 não aferida";
    else if(g("sat")) sat = "SatO2 " + g("sat") + "%";
    // PA
    let pa = "";
    if(g("pa")){ const t = g("pa"); pa = /pa|pam/i.test(t) ? t : ("PA " + t); }
    // DVA
    let dva = "";
    if(v.dva_sem) dva = "sem DVA";
    else { const ds = Object.keys(v.dva_drugs || {}).map(d => d + ((v.dva_drugs[d] || "").trim() ? " " + v.dva_drugs[d].trim() + " ml/h" : "") + ((v.dva_dd && v.dva_dd[d]) ? " (dose dobrada)" : "")); if(ds.length) dva = "em DVA: " + ds.join(", "); }
    // balanço
    const b = [];
    if(g("ganhos")) b.push("ganhos " + g("ganhos") + " ml");
    if(g("diurese")) b.push("diurese " + g("diurese") + " ml");
    if(v.diurese_q) b.push(v.diurese_q === "preservada" ? "diurese preservada" : v.diurese_q);
    if(v.edema) b.push("edema " + v.edema);
    if(v.svd === "com") b.push("com SVD");
    else if(v.svd === "sem") b.push("sem SVD");
    // exames
    const exF = [["Ureia","ur"],["Creatinina","cr"],["Na","na"],["K","pot"],["HCO3","hco3"]];
    const exP = exF.filter(([l,k]) => g(k)).map(([l,k]) => l + " " + g(k));
    // montar
    const s1 = [est, sang, resp, sat, pa, dva].filter(Boolean).join(", ");
    let body = s1;
    if(b.length) body += (body ? ". " : "") + cap(b.join(", "));
    const head = P.n || "";
    let out = "";
    if(head && body) out = head + " — " + body + ".";
    else if(head) out = head;
    else if(body) out = cap(body) + ".";
    if(exP.length) out += "\nExames de hoje: " + exP.join(", ") + ".";
    if((obs || "").trim()) out += "\nObs.: " + obs.trim();
    if((plant || "").trim()) out += "\n— " + plant.trim();
    const dataPl = (P.dt || "").trim() || new Date().toLocaleDateString("pt-BR");
    const corpo = out.trim();
    return "Plantão — " + dataPl + (corpo ? "\n" + corpo : "");
  }, [v, obs, plant, sexo]);

  const copy = () => {
    navigator.clipboard.writeText(txt).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 1800);
    }).catch(() => {});
  };

  const renderField = (f) => {
    if(f.k === "presp" && SUP_VM.includes(v.sup)) return null;
    if((f.k === "fio2" || f.k === "peep") && !SUP_FIO2.includes(v.sup)) return null;
    if(f.k === "fluxo" && !SUP_FLUXO.includes(v.sup)) return null;
    if(f.t === "chip") return (
      <div className="field" key={f.k}><label>{f.l}</label><Chips opts={f.opts} value={v[f.k] || ""} onPick={val => set(f.k, val)} /></div>
    );
    if(f.t === "num" || f.t === "text") {
      const bad = f.t === "num" && implausivel(f.k, v[f.k]);
      return (
        <div className="field" key={f.k}>
          <label>{f.l}</label>
          <input value={v[f.k] || ""} onChange={e => set(f.k, f.t === "num" ? xform(f.k, e.target.value) : e.target.value)} placeholder={f.ph} inputMode={f.t === "num" ? "decimal" : "text"} style={bad ? { borderColor:"#c0392b", background:"#fdecea" } : undefined} />
          {bad && <div style={{ fontSize:11, color:"#c0392b", marginTop:3 }}>confira o valor</div>}
        </div>
      );
    }
    if(f.t === "sang") return (
      <div className="field" key={f.k}>
        <label>Sangramento</label>
        <Chips opts={["não","ativo"]} value={v.sang || ""} onPick={val => set("sang", val)} />
        {v.sang === "ativo" && <input style={{ marginTop:6 }} value={v.sang_sitio || ""} onChange={e => set("sang_sitio", e.target.value)} placeholder="sítio (HDA, cateter, ferida operatória…)" />}
      </div>
    );
    if(f.t === "sat") return (
      <div className="field" key={f.k}>
        <label>SatO₂</label>
        <div className="row">
          <input style={{ width:96 }} value={v.sat || ""} onChange={e => setV(o => ({ ...o, sat: xform("sat", e.target.value), sat_flag: "" }))} placeholder="% · 98" inputMode="decimal" />
          <span className={"chip" + (v.sat_flag === "saturando bem" ? " on" : "")} onClick={() => setV(o => ({ ...o, sat_flag: o.sat_flag === "saturando bem" ? "" : "saturando bem", sat: "" }))}>saturando bem</span>
          <span className={"chip" + (v.sat_flag === "ND" ? " on" : "")} onClick={() => setV(o => ({ ...o, sat_flag: o.sat_flag === "ND" ? "" : "ND", sat: "" }))}>ND</span>
        </div>
      </div>
    );
    if(f.t === "diurese") return (
      <div className="field" key={f.k}>
        <label>Diurese</label>
        <div className="row">
          <input style={{ width:120 }} value={v.diurese || ""} onChange={e => setV(o => ({ ...o, diurese: xform("diurese", e.target.value), diurese_q: "" }))} placeholder="ml · 1500" inputMode="decimal" />
          {["preservada","oligúria","anúria"].map(o => (
            <span key={o} className={"chip" + (v.diurese_q === o ? " on" : "")} onClick={() => setV(st => ({ ...st, diurese_q: st.diurese_q === o ? "" : o, diurese: "" }))}>{o}</span>
          ))}
        </div>
      </div>
    );
    if(f.t === "dva") return (
      <div className="field" key={f.k}>
        <label>DVAs</label>
        <div className="chips">
          <span className={"chip" + (v.dva_sem ? " on" : "")} onClick={() => setV(o => ({ ...o, dva_sem: !o.dva_sem, dva_drugs: {}, dva_dd: {} }))}>sem DVA</span>
          {DVAS.map(d => {
            const sel = !!(v.dva_drugs && (d in v.dva_drugs));
            return <span key={d} className={"chip" + (sel ? " on" : "")} onClick={() => setV(o => { const dd = { ...(o.dva_drugs || {}) }; const ddd = { ...(o.dva_dd || {}) }; if(d in dd){ delete dd[d]; delete ddd[d]; } else dd[d] = ""; return { ...o, dva_drugs: dd, dva_dd: ddd, dva_sem: false }; })}>{d}</span>;
          })}
        </div>
        {Object.keys(v.dva_drugs || {}).map(d => (
          <div key={d} style={{ marginTop:8 }}>
            <div className="row">
              <span style={{ fontSize:13, flex:1 }}>{d}</span>
              <input style={{ width:120 }} value={(v.dva_drugs || {})[d] || ""} onChange={e => setV(o => ({ ...o, dva_drugs: { ...o.dva_drugs, [d]: normDec(e.target.value) } }))} placeholder="vazão (ml/h)" inputMode="decimal" />
            </div>
            <div className="chips" style={{ marginTop:4 }}>
              <span className={"chip" + ((v.dva_dd && v.dva_dd[d]) ? " on" : "")} onClick={() => setV(o => ({ ...o, dva_dd: { ...o.dva_dd, [d]: !(o.dva_dd && o.dva_dd[d]) } }))}>dose dobrada</span>
            </div>
          </div>
        ))}
      </div>
    );
    return null;
  };

  return (
    <div className="wrap">
      <div className="eyebrow">Avaliação · plantão <span className="ver">v1.7</span></div>

      <div className="pcard">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
          <div>
            <div className="pname">{P.n || "—"}</div>
            <div className="psub">{[P.st, P.lt ? ("leito " + P.lt) : "", P.id ? (P.id + " anos") : ""].filter(Boolean).join(" · ") || " "}</div>
          </div>
          {!linkSx && (
            <div style={{ display:"flex", gap:6, flexShrink:0 }}>
              {["M","F"].map(s => (
                <span key={s} onClick={() => setSexo(s)} style={{ padding:"5px 11px", borderRadius:999, fontSize:13, fontWeight:700, cursor:"pointer", userSelect:"none", border:"1px solid rgba(255,255,255,.55)", background: sexo===s ? "#fff" : "transparent", color: sexo===s ? "#0E6E68" : "#fff" }}>{s === "M" ? "♂ M" : "♀ F"}</span>
              ))}
            </div>
          )}
        </div>
      </div>

      {BLOCOS.map((b, bi) => (
        <div className="card" key={bi}>
          <div className="ghead">{b.g}</div>
          <div className={b.grid ? "grid" : ""}>
            {b.fields.map(f => renderField(f))}
          </div>
        </div>
      ))}

      <div className="card">
        <div className="ghead">Observações</div>
        <div className="field">
          <textarea value={obs} onChange={e => setObs(e.target.value)} placeholder="opcional — qualquer detalhe relevante" rows={2}></textarea>
        </div>
        <div className="field">
          <label>Plantonista</label>
          <input value={plant} onChange={e => setPlant(e.target.value)} placeholder="seu nome" />
        </div>
      </div>

      <div className="card preview">
        <div className="ghead">Texto para o WhatsApp</div>
        <pre className="ptext">{txt}</pre>
        <button className="copybtn" onClick={copy}>{copied ? "✓ copiado" : "Copiar texto"}</button>
      </div>

      <div className="foot">Toque para marcar; digite onde for valor. Campos em branco não entram no texto.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
