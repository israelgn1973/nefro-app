  try {

};

// ── COMPONENTES ──
function Badge({ conduta }) {
  const map = { hd_hoje: ['HD HOJE', '#c0392b'], hd_amanha: ['HD AMANHÃ', '#e67e22'], conservador: ['CONSERVADOR', '#27ae60'], alta: ['ALTA', '#888'] };
  const [label, color] = map[conduta] || ['', ''];
  if (!label) return null;
  return <span style={{ ...S.badge, background: color }}>{label}</span>;
}

function FormRow({ label, children }) {
  return <div style={S.formRow}><span style={S.label}>{label}</span>{children}</div>;
}

function Section({ title, children }) {
  return (
    <div style={S.formSection}>
      <div style={S.formLabel}>{title}</div>

}

const FLEX_F = { orientado:'orientada', sonolento:'sonolenta', torporoso:'torporosa', comatoso:'comatosa', confuso:'confusa', agitado:'agitada', sedado:'sedada', rebaixado:'rebaixada', 'gravíssimo':'gravíssima', eupneico:'eupneica', normotenso:'normotensa' };
const flexSexo = (txt, sexo) => {
  if (sexo !== 'F' || !txt) return txt;
  let t = txt;
  for (const k in FLEX_F) t = t.split(k).join(FLEX_F[k]);
  return t;
};

function NumPadOverlay({ pad, onChange, onClose }) {
  const fmtPA = (d) => {
    d = (d||'').replace(/\D/g, '').slice(0, 6);
    if (d.length >= 5) return d.slice(0, 3) + '/' + d.slice(3);
    if (d.length === 4) return d.slice(0, 2) + '/' + d.slice(2);
    return d;
  };
  const disp = pad.mode === 'pa' ? fmtPA(pad.value) : pad.value;
  const hintEl = pad.hint ? <div style={{ background: '#fef5e7', border: '1px solid #f0d9b5', borderRadius: 8, padding: '7px 10px', fontSize: 12.5, color: '#7a5c1e', marginBottom: 8 }}>💡 {pad.hint}</div> : null;
  const press = (k) => {
    if (k === 'back') onChange(pad.value.slice(0, -1));
    else if (k === ',') { if (pad.allowComma && !pad.value.includes(',')) onChange(pad.value + ','); }
    else onChange((pad.value + k).slice(0, pad.mode === 'pa' ? 6 : 8));
  };
  const ok = () => { pad.onSet(pad.mode === 'pa' ? fmtPA(pad.value) : pad.value); onClose(); };
  return (
    <div style={{ position: 'fixed', left: 0, right: 0, bottom: 0, background: 'white', boxShadow: '0 -4px 20px rgba(0,0,0,0.18)', borderRadius: '16px 16px 0 0', padding: '12px 16px 20px', zIndex: 1000, maxWidth: 480, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5 }}>{pad.label}</span>
        <span onClick={onClose} style={{ fontSize: 16, color: '#888', cursor: 'pointer', padding: 4 }}>✕</span>
      </div>
      {hintEl}
      <div style={{ textAlign: 'center', fontSize: 28, fontWeight: 700, color: '#1a3a5c', minHeight: 36, marginBottom: 10 }}>{disp || <span style={{ color: '#ccc' }}>—</span>}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {['1','2','3','4','5','6','7','8','9', pad.allowComma ? ',' : '', '0', 'back'].map((k, i) => k === '' ? <span key={i} /> : (
          <button key={i} onClick={() => press(k)}
            style={{ padding: '12px 0', fontSize: 20, fontWeight: 600, border: '1px solid #eee', borderRadius: 10, background: '#fafbfc', cursor: 'pointer' }}>
            {k === 'back' ? '⌫' : k}
          </button>
        ))}
      </div>
      <button onClick={ok} style={{ width: '100%', marginTop: 10, padding: 12, borderRadius: 10, border: 'none', background: '#1a3a5c', color: 'white', fontWeight: 700, fontSize: 16, cursor: 'pointer' }}>OK</button>
    </div>
  );
}

function ChipSelect({ label, options, value, onSelect, color = '#1a3a5c', herdado = false }) {

        {label}
        {herdado && <span style={{ fontSize: 9, color: '#e67e22', background: '#fef5e7', padding: '1px 6px', borderRadius: 6, fontWeight: 700 }}>DE ONTEM</span>}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {value && !options.includes(value) && (
          <span style={{ ...S.checkItem, fontSize: 12, background: color, color: 'white', borderColor: color }}>{value}</span>
        )}
        {options.map(o => (
          <span key={o} style={{ ...S.checkItem, fontSize: 12, ...(value === o ? { background: color, color: 'white', borderColor: color } : {}) }}
            onClick={() => onSelect(o)}>{o}</span>
        ))}
      </div>
    </div>
  );
}

          if (aj.droga === 'furo_amp' || aj.droga === 'furo_cp') return { ...base, diureticos: [...new Set([...base.diureticos, 'Furosemida'])], furo_manut: aj.droga === 'furo_amp' ? 'amp' : 'cp', furo_dose_n: aj.n || '', furo_int: aj.int || '' };

          if (aj.droga === 'hctz') return { ...base, diureticos: [...new Set([...base.diureticos, 'Hidroclorotiazida'])], hctz_cp: aj.n || '', hctz_int: aj.int || '' };
          return base;
        })(),
        espiro_cp: prev.espiro_cp || '', espiro_int: prev.espiro_int || '', hctz_cp: prev.hctz_cp || '', hctz_int: prev.hctz_int || '',
        acesso: prev.acesso || 'CDL', anticoag_hd: prev.anticoag_hd || 'sem heparina', cateter_pos: prev.cateter_pos || 'Bic. Na 8,4%',
        med_revisar: [...(prev.med_revisar || [])],
        // Marca de campos herdados (para destaque "de ontem" e checagem no panorama)
        _herdados: ['padrao_resp','resp','edema','svd','diureticos','acesso','anticoag_hd','med_revisar'].filter(k => {
          const v = prev[k]; return Array.isArray(v) ? v.length > 0 : (v !== '' && v != null && v !== 'ausente' && v !== 'sem');
        }),

          ureia_basal: prev.labs?.ureia_basal || prev.labs?.ureia_hoje,

  function salvarAvaliacao() {
    const avs = avaliacoes[pacAtual.id] || [];
    const novas = [avAtual, ...avs.filter(a => a.id !== avAtual.id)];
    setAvaliacoes({ ...avaliacoes, [pacAtual.id]: novas });
    const pacs = pacientes.map(p => p.id === pacAtual.id
      ? { ...p, ultimaAvaliacao: { conduta: avAtual.conduta, data: avAtual.data } } : p);
    setPacientes(pacs);
    setPacAtual(pacs.find(p => p.id === pacAtual.id));
    setTab('ultima');
    setView('paciente');
  }

  function abrirEdicaoPaciente() {
    const convenioLista = pacAtual.convenio === 'SUS' || CONVENIOS.includes(pacAtual.convenio);
    setNovoPac({
      nome:'', idade:'', sexo:'', leito:'', convenioOutro:'', filaHD:'', uti:'', perfilHemo:'', fe:'', comorbidades_outras:'', sepseOutro:'', gatilhos_outros:'',
      comorbidades:[], gatilhos:[], sepseFocos:[], urgencias:[], urgenciaAdm:false,
      ...pacAtual,
      temLeito: !!pacAtual.leito,

  function salvarNovoPaciente() {
    if (!novoPac.nome.trim()) return;
    if (!editandoPacId) {
      const hom = pacientes.find(p => nrmNome(p.nome) === nrmNome(novoPac.nome) && String(p.idade || '') === String(novoPac.idade || ''));
      if (hom && !confirm(`Já existe "${hom.nome}" (${hom.idade || '?'} anos) cadastrado. Cadastrar mesmo assim cria um possível duplicado. Continuar?`)) return;
    }
    const convenioFinal = novoPac.convenio === 'OUTROS' ? (novoPac.convenioOutro.trim() || 'OUTROS') : novoPac.convenio;
    const leitoFinal = novoPac.temLeito ? novoPac.leito : '';
    if (editandoPacId) {
      const atualizado = { ...novoPac, convenio: convenioFinal, leito: leitoFinal, status: montarStatus(novoPac.diag, novoPac.trat), id: editandoPacId, updatedAt: Date.now() };
      setPacientes(ps => ps.map(p => p.id === editandoPacId ? atualizado : p));
      setPacAtual(atualizado);
      setEditandoPacId(null);
      setShowModal(false);
      return;
    }
    const p = { ...novoPac, convenio: convenioFinal, leito: leitoFinal, status: montarStatus(novoPac.diag, novoPac.trat), id: 'p_' + Date.now(), updatedAt: Date.now() };
    setPacientes([p, ...pacientes]);
    setAvaliacoes({ ...avaliacoes, [p.id]: [] });
    setPacAtual(p);
    setNovoPac({ nome:'', idade:'', sexo:'', leito:'', temLeito:false, convenio:'SUS', convenioOutro:'', diag:'IRA', trat:'tratamento conservador', filaHD:'', uti:'', comorbidades:[], perfilHemo:'', fe:'', comorbidades_outras:'', gatilhos:[], sepseFocos:[], sepseOutro:'', gatilhos_outros:'', urgenciaAdm:false, urgencias:[] });
    setShowModal(false);
    setTab('info');
    setView('paciente');

  function upAv(key, val) {
    setAvAtual(a => {
      const herdados = (a._herdados || []).filter(k => k !== key);
      return { ...a, [key]: val, _herdados: herdados };
    });
  }

  function exportarDados() {
    try { localStorage.setItem('nefroapp_last_backup', new Date().toISOString().slice(0, 10)); } catch {}
    const dt = new Date().toISOString().slice(0, 10);
    const nome = `nefroapp_backup_${dt}.json`;
    const blob = new Blob([JSON.stringify({ pacientes, avaliacoes, exportadoEm: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const file = new File([blob], nome, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: nome }).catch(() => {});
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nome;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  }

  function importarDados(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.pacientes) { alert('Arquivo inválido.'); return; }
        const qtd = d.pacientes.length;
        if (confirm(`Importar ${qtd} paciente(s) mesclando com os atuais? Pacientes existentes são mantidos; em coincidências vale o registro mais recente.`)) {
          // vencedor por paciente: o lado com updatedAt mais recente
          const recencia = p => p.updatedAt || 0;
          const novosVence = {};
          const mapaPac = {};
          pacientes.forEach(p => { mapaPac[p.id] = p; });
          d.pacientes.forEach(p => {
            if (!mapaPac[p.id] || recencia(p) >= recencia(mapaPac[p.id])) { mapaPac[p.id] = p; novosVence[p.id] = true; }
          });
          const pacMerged = Object.values(mapaPac);

          const avMerged = { ...avaliacoes };
          const dia = a => { try { return new Date(a.data).toISOString().slice(0, 10); } catch { return String(a.data); } };
          Object.entries(d.avaliacoes || {}).forEach(([pid, avsImp]) => {
            const atuais = avMerged[pid] || [];
            const porDia = {};
            atuais.forEach(a => { porDia[dia(a)] = a; });
            (avsImp || []).forEach(a => {
              const k = dia(a);
              if (!porDia[k] || novosVence[pid]) porDia[k] = a; // coincidência de dia: vale o lado do paciente mais recente
            });
            avMerged[pid] = Object.values(porDia).sort((x, y) => new Date(y.data) - new Date(x.data));
          });

          setPacientes(pacMerged);
          setAvaliacoes(avMerged);
          const homs = [];
          pacMerged.forEach((p, i) => pacMerged.slice(i + 1).forEach(q => {
            if (nrmNome(p.nome) === nrmNome(q.nome) && String(p.idade || '') === String(q.idade || '')) homs.push(p.nome);
          }));
          alert(`Importação concluída: ${pacMerged.length} paciente(s) no app.` + (homs.length ? `\n\nAtenção — possíveis duplicados (homônimos com mesma idade): ${[...new Set(homs)].join(', ')}. Estão marcados na lista; arraste para a esquerda o registro que não quer manter e exclua.` : ''));
        }
      } catch (err) { alert('Erro ao ler o arquivo.'); }
    };
    reader.readAsText(file);
  }

                <span onClick={() => setNovoPac(n => ({ ...n, temLeito: !n.temLeito, leito: !n.temLeito ? n.leito : '' }))}
                  style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 14 }}>
                  <span style={{ width: 20, height: 20, borderRadius: 4, border: '1.5px solid #ccc', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: novoPac.temLeito ? '#1a3a5c' : 'white', color: 'white', fontSize: 13 }}>{novoPac.temLeito ? '✓' : ''}</span>
                  Leito (fora da UTI)
                </span>
                {novoPac.temLeito && (
                  <input style={{ ...S.input, flex: 1, maxWidth: 120 }} type="text" value={novoPac.leito} onChange={e => setNovoPac(n => ({...n, leito: e.target.value}))} placeholder="Nº leito" />
                )}

            <button style={{ ...S.btn, background: '#1a3a5c', color: 'white', width: '100%' }} onClick={salvarNovoPaciente}>{editandoPacId ? 'Salvar alterações' : 'Cadastrar'}</button>
            {editandoPacId && (
              <button style={{ ...S.btn, background: 'white', color: '#c0392b', border: '1.5px solid #c0392b', width: '100%', marginTop: 10 }}
                onClick={() => {
                  const n = (avaliacoes[editandoPacId] || []).length;
                  const nome = (pacientes.find(p => p.id === editandoPacId) || {}).nome || '';
                  if (!confirm(`Excluir ${nome}?`)) return;
                  if (!confirm(`Tem certeza? Serão apagadas ${n} avaliação(ões). Esta ação NÃO pode ser desfeita.`)) return;
                  setPacientes(ps => ps.filter(p => p.id !== editandoPacId));
                  setAvaliacoes(av => { const novo = { ...av }; delete novo[editandoPacId]; return novo; });
                  setShowModal(false); setEditandoPacId(null); setPacAtual(null); setAvAtual(null); setView('lista');
                }}>
                🗑 Excluir paciente
              </button>
            )}
          </div>
        </div>
  ) : null;

  const infoHD = (() => {
    const hojeISO = new Date().toISOString().slice(0, 10);
    const ontemISO = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const ds = new Date().getDay();
    const m = {};
    pacientes.forEach(p => {
      const avsP = avaliacoes[p.id] || [];
      const diaDe = a => new Date(a.data).toISOString().slice(0, 10);
      const avHoje = avsP.find(a => diaDe(a) === hojeISO);
      const avOntem = avsP.find(a => diaDe(a) === ontemISO);
      const temPrescricao = avsP.some(a => a.conduta === 'hd_hoje');
      let motivo = null;
      if (temPrescricao && avHoje?.conduta !== 'hd_hoje') {
        if (avOntem?.conduta === 'hd_amanha') motivo = 'ontem: HD amanhã';
        else if (avOntem?.conduta === 'hd_hoje') motivo = 'dialisou ontem';
        else if (p.esquemaHD === 'diaria') motivo = 'esquema diário';
        else if (p.esquemaHD === 'sqs' && [1,3,5].includes(ds)) motivo = 'esquema Seg/Qua/Sex';
        else if (p.esquemaHD === 'tqs' && [2,4,6].includes(ds)) motivo = 'esquema Ter/Qui/Sáb';
      }
      let amanha = null;
      if (temPrescricao && p.esquemaHD !== 'susp') {
        const dsAm = (ds + 1) % 7;
        if (avHoje?.conduta === 'hd_amanha') amanha = 'conduta de hoje: HD amanhã';
        else if (avHoje?.conduta === 'hd_hoje') amanha = 'dialisou hoje';
        else if (p.esquemaHD === 'diaria') amanha = 'esquema diário';
        else if (p.esquemaHD === 'sqs' && [1,3,5].includes(dsAm)) amanha = 'esquema Seg/Qua/Sex';
        else if (p.esquemaHD === 'tqs' && [2,4,6].includes(dsAm)) amanha = 'esquema Ter/Qui/Sáb';
      }
      const ultAv = avsP[0];
      const TERMINAIS = ['alta_nefro', 'alta_hosp', 'paliativo', 'obito'];
      const arquivado = !!(ultAv && TERMINAIS.includes(ultAv.conclusao) && (!p.reativadoEm || p.reativadoEm < ultAv.data));
      const homonimo = pacientes.some(q => q.id !== p.id && nrmNome(q.nome) === nrmNome(p.nome) && String(q.idade || '') === String(p.idade || ''));
      m[p.id] = { homonimo, vistoHoje: !!avHoje, arquivado, conclusaoFinal: ultAv?.conclusao, motivo, amanha, prioridadeOntem: avOntem?.prioridade === 'sim' && avHoje?.conduta !== 'hd_hoje', suspensa: p.esquemaHD === 'susp' };
    });
    return m;
  })();

  if (view === 'stats') {
    const mesesDisp = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      mesesDisp.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    }
    const mes = mesStats || mesesDisp[0];
    const noMes = ts => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === mes; };
    const todasAvs = Object.entries(avaliacoes).flatMap(([pid, avs]) => (avs || []).map(a => ({ ...a, pid })));
    const avsMes = todasAvs.filter(a => noMes(a.data));
    const pacsUnicos = [...new Set(avsMes.map(a => a.pid))];
    const novos = pacientes.filter(p => noMes(parseInt((p.id || '').split('_')[1]) || p.updatedAt || 0)).length;
    const hds = avsMes.filter(a => a.conduta === 'hd_hoje');
    const urgentes = hds.filter(a => a.prioridade === 'sim');
    const diasComAv = [...new Set(avsMes.map(a => new Date(a.data).toISOString().slice(0, 10)))].length;
    const desf = { alta_nefro: 0, alta_hosp: 0, paliativo: 0, obito: 0 };
    pacsUnicos.forEach(pid => {

      if (ult && noMes(ult.data) && desf[ult.conclusao] != null) desf[ult.conclusao]++;
    });
    const concluidos = desf.alta_nefro + desf.alta_hosp + desf.paliativo + desf.obito;
    const mort = concluidos ? Math.round(100 * desf.obito / concluidos) : null;
    const rotMes = m => { const [a, mm] = m.split('-'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(mm)-1] + '/' + a; };
    const copiar = () => {
      const L = [];

      L.push('');
      L.push(`Avaliações: ${avsMes.length}`);
      L.push(`Pacientes acompanhados: ${pacsUnicos.length}`);
      L.push(`Pacientes novos: ${novos}`);
      L.push(`Dias com atividade: ${diasComAv}`);
      L.push('');
      L.push(`Sessões de HD prescritas: ${hds.length}`);
      L.push(`HD urgentes: ${urgentes.length}`);
      L.push('');
      L.push(`Desfechos no mês — alta da nefrologia: ${desf.alta_nefro} · alta hospitalar: ${desf.alta_hosp} · paliativos: ${desf.paliativo} · óbitos: ${desf.obito}`);
      if (mort != null) L.push(`Mortalidade entre concluídos: ${mort}%`);
      L.push('');
      L.push('Fonte: registros do NefroApp (atividade do nefrologista).');
      navigator.clipboard?.writeText(L.join('\n')).then(() => alert('Relatório copiado.'), () => alert('Não foi possível copiar.'));
    };
    const Cartao = ({ n, l }) => (
      <div style={{ flex: '1 1 28%', background: 'white', borderRadius: 12, padding: '14px 10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.07)' }}>
        <div style={{ fontSize: 26, fontWeight: 800, color: '#1a3a5c' }}>{n}</div>
        <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{l}</div>
      </div>
    );
    return (
      <div style={S.app}>
        <div style={S.header}>
          <button style={S.backBtn} onClick={() => setView('lista')}>‹</button>
          <h1 style={S.h1}>📊 Relatório do serviço</h1>
        </div>
        <div style={{ padding: 16 }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
            {mesesDisp.map(m => (
              <span key={m} style={{ ...S.checkItem, fontSize: 12, ...(m === mes ? { background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' } : {}) }}

      </div>


      {(() => {
        const hojeISO = new Date().toISOString().slice(0, 10);
        const ontemISO = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        const n = pacientes.filter(p => infoHD[p.id]?.motivo || infoHD[p.id]?.prioridadeOntem).length;

              style={{ width: '100%', padding: 10, borderRadius: 10, border: '1.5px solid #c0392b', background: filtroHD ? '#c0392b' : '#fdf0ef', color: filtroHD ? 'white' : '#c0392b', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>

            </button>
          </div>
        );
      })()}

      {(() => {
        const ativos = pacientes.filter(p => !infoHD[p.id]?.arquivado);

      add('SVD', d.svd);
      if (d.semFuro && !(d.diureticos || []).length) add('Diuréticos', 'sem furosemida');
      if ((d.diureticos || []).length) {
        const det = [];
        if (d.diureticos.includes('Furosemida') && d.furo_manut !== 'sem') det.push(`Furosemida ${d.furo_dose_n || ''}${d.furo_manut === 'amp' ? 'amp' : 'cp'} ${d.furo_int || ''}`);
        if (d.furo_bolus_n) det.push(`Furosemida bolus ${d.furo_bolus_amp || ''}amp x${d.furo_bolus_n}`);
        if (d.diureticos.includes('Espironolactona')) det.push(`Espironolactona ${(parseInt(d.espiro_cp) || 1) * 25}mg ${d.espiro_int || ''}`);
        if (d.diureticos.includes('Hidroclorotiazida')) det.push(`Hidroclorotiazida ${(parseInt(d.hctz_cp) || 1) * 25}mg ${d.hctz_int || ''}`);
        add('Diuréticos', [d.semFuro ? 'sem furosemida' : null, det.length ? det.join('; ') : d.diureticos.join(', ')].filter(Boolean).join('; '));
      }

      const labLinha = [['Ureia', 'ureia'], ['Creat', 'creat'], ['Na', 'sodio'], ['K', 'pot'], ['Bic', 'bic']]
        .map(([lbl, key]) => { const v = L[`${key}_hoje`]; return (v != null && v !== '') ? `${lbl} ${v}` : null; }).filter(Boolean);
      if (labLinha.length) { linhas.push(''); linhas.push('LABORATÓRIO'); linhas.push(labLinha.join(' / ')); }

      if (d.ultima_hd_data || d.tempo_obtido || d.uf_obtida) {
        linhas.push(''); linhas.push('ÚLTIMA HD');
        add('Data', d.ultima_hd_data ? new Date(d.ultima_hd_data + 'T12:00').toLocaleDateString('pt-BR') : '');
        add('Acesso', d.acesso);
        add('Tempo obtido', d.tempo_obtido ? d.tempo_obtido + 'h' : '');
        add('UF obtida', d.uf_obtida ? d.uf_obtida + ' ml' : '');
        add('Anticoagulação', d.anticoag_hd);
        const ic = (Array.isArray(d.interc) ? d.interc : []).filter(x => x !== 'Nenhuma');
        add('Intercorrências', ic.length ? ic : '');
      }

      const preopLista = (pacAtual.preopTipos || []).map(t => t === 'Outro' ? (pacAtual.preopOutro || 'Outro') : t).join(', ');
      if ((pacAtual.gatilhos || []).includes('Pré-operatório')) {
        linhas.push(''); linhas.push('PARECER PRÉ-OPERATÓRIO');
        if (preopLista) linhas.push('Cirurgia proposta: ' + preopLista);
        linhas.push('Apesar do risco aumentado de complicações renais e sistêmicas, do ponto de vista nefrológico não há contraindicação absoluta à realização do procedimento proposto. Recomenda-se avaliação criteriosa da relação risco-benefício pela equipe assistente.');
      }
      linhas.push(''); linhas.push('CONDUTA');
      add('Decisão', { hd_hoje: 'HD HOJE', hd_amanha: 'HD AMANHÃ', conservador: 'Conservador' }[d.conduta]);
      if (d.conduta === 'hd_hoje') {
        if (d.prioridade === 'sim') linhas.push('** SESSÃO URGENTE **');
        const ufEf = num(d.uf_hd) + num(d.uf_isolada);
        add('HD', `${d.hd_dur || d.hd_horas || '?'}h, UF efetiva ${ufEf} ml`);
      }
const ajRotulo = aj => {
        if (!aj || !aj.droga) return '';
        const nome = { furo_amp: 'Furosemida', furo_cp: 'Furosemida', espiro: 'Espironolactona', hctz: 'Hidroclorotiazida', susp_furo: '' }[aj.droga];
        if (aj.droga === 'susp_furo') return 'suspender furosemida';
        const un = aj.droga === 'furo_amp' ? 'amp' : aj.droga === 'furo_cp' ? 'cp' : 'cp';
        return `${nome} ${aj.n || '?'}${un} ${aj.int || ''}`.trim();
      };
      if ((d.cond_vol || []).length) {
        const vol = d.cond_vol.map(c => {
          if (c === 'Ajustar diurético' && (d.aj_diur||{}).droga) {
            return `Ajustar diurético — dose atual: ${diurTxt || 'sem diurético'}; ajustar para: ${ajRotulo(d.aj_diur)}`;
          }
          return c;
        });
        add('Volemia', vol);
      }
      if ((d.atbs || []).length) add('Antibióticos em uso', d.atbs);
      (d.cond_alertas || []).forEach(c => linhas.push('- ' + c));
      if ((d.cond_eletr || []).length) add('Eletrólitos', d.cond_eletr);
      if ((d.med_revisar || []).length) add('Revisar/suspender', d.med_revisar);
      if ((d.cond_outras_sel || []).length) add('Outras', d.cond_outras_sel);
      add('Conclusão', { acompanhamento: 'Segue em acompanhamento', alta_nefro: 'Alta da nefrologia', alta_hosp: 'Alta hospitalar', paliativo: 'Cuidados paliativos', obito: 'Óbito' }[d.conclusao]);
      if (d.observacoes) { linhas.push(''); add('Obs', d.observacoes); }

      return linhas.join('\n');
    };

    const copiarPanorama = () => {
      const txt = gerarTextoPanorama();
      const done = () => { setCopiado(true); setTimeout(() => setCopiado(false), 2000); };
      if (navigator.clipboard?.writeText) navigator.clipboard.writeText(txt).then(done).catch(() => prompt('Copie o texto:', txt));
      else prompt('Copie o texto:', txt);
    };

    return (
      <div style={S.app}>{numPadEl}
        <div style={S.header}>
          <button style={S.backBtn} onClick={() => setView('roteiro')}>‹</button>
          <h1 style={S.h1}>Panorama</h1>
        </div>
        <TabBar atual="panorama" />
        <div style={{ padding: 16, paddingBottom: 90 }}>
          <div style={{ marginBottom: 12, padding: '12px 14px', background: '#1a3a5c', color: 'white', borderRadius: 10 }}>
            <div style={{ fontSize: 18, fontWeight: 700 }}>{pacAtual.nome}</div>
            <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>
              {pacAtual.idade && `${pacAtual.idade}a · `}{pacAtual.sexo && `${pacAtual.sexo} · `}{pacAtual.uti && `UTI ${pacAtual.uti}`}{pacAtual.leito && ` · Leito ${pacAtual.leito}`}
            </div>
            <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>{pacAtual.status}</div>
          </div>

          {herdadosPend.length > 0 && (
            <div style={{ marginBottom: 12, padding: '12px 14px', background: '#fef5e7', borderLeft: '3px solid #e67e22', borderRadius: 8 }}>
              <div style={{ fontWeight: 700, color: '#e67e22', marginBottom: 4 }}>⚠ Dados de ontem não confirmados</div>
              <div style={{ fontSize: 13, color: '#555' }}>
                Estes campos foram trazidos da avaliação anterior e você ainda não revisou: <b>{herdadosPend.map(k => rotuloHerdado[k] || k).join(', ')}</b>. Toque neles na avaliação para confirmar ou atualizar.
              </div>
            </div>
          )}

          {(((pacAtual.comorbidades || []).length > 0) || ((pacAtual.gatilhos || []).length > 0)) && (
            <Bloco titulo="Contexto clínico">
              {(pacAtual.comorbidades || []).length > 0 && <Item k="Comorbidades" v={[...pacAtual.comorbidades, pacAtual.comorbidades_outras].filter(Boolean).join(', ')} />}
              {(pacAtual.gatilhos || []).length > 0 && <Item k="Eventos agudos" v={[...pacAtual.gatilhos, pacAtual.gatilhos_outros].filter(Boolean).join(', ')} />}
            </Bloco>
          )}

          <Bloco titulo="Beira leito">
            <Item k="Estado geral" v={avAtual.eg} />
            <Item k="Consciência" v={avAtual.consciencia} />
            <Item k="Respiração" v={[avAtual.padrao_resp, avAtual.resp].filter(Boolean).join(", ") + (avAtual.fio2 ? ` · FiO2 ${avAtual.fio2}%` : '') + (avAtual.peep ? ` · PEEP ${avAtual.peep}` : '') + (avAtual.fluxoO2 ? ` · ${avAtual.fluxoO2}L/min` : '')} />
            <Item k="SatO2" v={avAtual.sat} />
            <Item k={avAtual.pai ? 'PAM' : 'PA'} v={avAtual.pai ? avAtual.pam : avAtual.pa} />
            <Item k="Drogas vasoativas" v={dvasTxt} />
            <Item k="Edema" v={avAtual.edema} />
          </Bloco>

          <Bloco titulo="BH & Diurético">
            <Item k="Diurese" v={avAtual.diurese ? `${avAtual.diurese} ml${avAtual.bh_parcial && avAtual.bh_horas ? ` (parcial ${avAtual.bh_horas}h)` : ''}` : ''} />
            <Item k="SVD" v={avAtual.svd} />
            <Item k="Diuréticos" v={diurTxt} />
          </Bloco>

          <Bloco titulo="Laboratório (hoje)">
            {avAtual.semExames && <div style={{ fontStyle: 'italic', color: '#888', marginBottom: 6 }}>Sem exames hoje</div>}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
              {[['Ureia','ureia'],['Creat','creat'],['Na','sodio'],['K','pot'],['Bic','bic'],['Cai','ca'],['Mg','mg'],['P','p']].map(([lbl, key]) => {
                const v = L[`${key}_hoje`]; const n = num(v);
                if (v == null || v === '') return null;
                const c = labCrit(key, n);
                return <span key={key} style={{ fontWeight: c ? 700 : 400, color: c ? '#c0392b' : '#333' }}>{lbl} <b>{v}</b></span>;
              })}
            </div>
          </Bloco>

          {(pacAtual.gatilhos || []).includes('Pré-operatório') && (
            <Bloco titulo="Parecer pré-operatório">
              <div style={{ fontStyle: 'italic' }}>Apesar do risco aumentado de complicações renais e sistêmicas, do ponto de vista nefrológico não há contraindicação absoluta à realização do procedimento proposto. Recomenda-se avaliação criteriosa da relação risco-benefício pela equipe assistente.</div>
            </Bloco>
          )}

          {(() => {
            const aj = avAtual.aj_diur || {};
            const nomeAj = aj.droga === 'susp_furo' ? 'suspender furosemida'
              : aj.droga ? `${({furo_amp:'Furosemida',furo_cp:'Furosemida',espiro:'Espironolactona',hctz:'Hidroclorotiazida'})[aj.droga]} ${aj.n || '?'}${aj.droga === 'furo_amp' ? 'amp' : 'cp'} ${aj.int || ''}`.trim() : '';
            const condRot = { hd_hoje: 'HD HOJE', hd_amanha: 'HD amanhã', conservador: 'Tratamento conservador' }[avAtual.conduta] || avAtual.conduta;
            return (
              <Bloco titulo="Conduta">
                <Item k="Conduta" v={condRot} />
                {nomeAj && <Item k="Ajuste de diurético" v={`dose atual: ${diurTxt || 'sem diurético'} → ajustar para: ${nomeAj}`} />}
                {(avAtual.cond_vol || []).filter(c => c !== 'Ajustar diurético' || !nomeAj).length > 0 && <Item k="Volemia" v={(avAtual.cond_vol || []).filter(c => c !== 'Ajustar diurético' || !nomeAj).join(', ')} />}
                {(avAtual.atbs || []).length > 0 && <Item k="Antibióticos" v={(avAtual.atbs || []).join(', ')} />}
                {(avAtual.cond_alertas || []).map((c, i) => <Item key={'al'+i} k="Conduta de alerta" v={c} />)}
                {(avAtual.cond_eletr || []).length > 0 && <Item k="Eletrólitos" v={(avAtual.cond_eletr || []).join(', ')} />}
                {(avAtual.cond_outras_sel || []).length > 0 && <Item k="Outras" v={(avAtual.cond_outras_sel || []).map(c => c === 'Troca de diluições' && avAtual.troca_diluicoes ? `Troca de diluições → ${avAtual.troca_diluicoes}` : c).join(', ')} />}
              </Bloco>
            );
          })()}

          {(avAtual.ultima_hd_data || avAtual.tempo_obtido || avAtual.uf_obtida) && (
<Bloco titulo="Última HD">
            <Item k="1ª HD" v={pacAtual.dataPrimeiraHD} />
            <Item k="Data da sessão" v={avAtual.ultima_hd_data} />
            <Item k="Acesso" v={avAtual.acesso} />
            <Item k="Tempo obtido" v={avAtual.tempo_obtido ? `${avAtual.tempo_obtido}h` : ''} />
            <Item k="UF obtida" v={avAtual.uf_obtida ? `${avAtual.uf_obtida} ml` : ''} />
            <Item k="Anticoagulação" v={avAtual.anticoag_hd} />
            <Item k="Intercorrências" v={(Array.isArray(avAtual.interc) ? avAtual.interc : []).join(', ')} />
          </Bloco>
          )}

          {(avAtual.med_revisar || []).length > 0 && (
            <Bloco titulo="Medicamentos a revisar">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {avAtual.med_revisar.map(m => <span key={m} style={{ ...S.badge, background: '#c0392b' }}>{m}</span>)}
              </div>
            </Bloco>
          )}

          <div style={{ ...S.card, marginBottom: 12, border: '2px solid #1a3a5c' }}>
            <div style={{ ...S.cardHeader, background: '#1a3a5c', color: 'white' }}>Conduta</div>
            <div style={{ padding: 14, fontSize: 14, lineHeight: 1.7 }}>
              <Item k="Decisão" v={{ hd_hoje: 'HD HOJE', hd_amanha: 'HD AMANHÃ', conservador: 'CONSERVADOR' }[avAtual.conduta]} />
              {avAtual.conduta === 'hd_hoje' && (
                <div style={{ marginTop: 4 }}>
                  {avAtual.prioridade === 'sim' && <div style={{ color: '#c0392b', fontWeight: 700 }}>⚠ Sessão URGENTE</div>}
                  <Item k="Duração" v={(avAtual.hd_dur || avAtual.hd_horas) ? `${avAtual.hd_dur || avAtual.hd_horas}h` : ''} />
                  <Item k="Fluxos" v={`${avAtual.fluxo_sangue || '200'} / ${avAtual.fluxo_banho || '300'}`} />
                  <Item k="UF efetiva" v={((num(avAtual.uf_hd) || 0) + (num(avAtual.uf_isolada) || 0)) + ' ml'} />
                </div>
              )}
              <Item k="Conclusão" v={{ acompanhamento: 'Segue em acompanhamento', alta_nefro: 'Alta da nefrologia', alta_hosp: 'Alta hospitalar', paliativo: 'Cuidados paliativos', obito: 'Óbito' }[avAtual.conclusao]} />
            </div>
          </div>
        </div>

        <div style={S.bottomActions}>
          <button style={{ ...S.btn, background: '#f0f0f0', flex: '0 0 auto', padding: '12px 14px' }} onClick={() => setView('roteiro')}>‹</button>
          <button style={{ ...S.btn, background: copiado ? '#1a3a5c' : '#27ae60', color: 'white' }} onClick={copiarPanorama}>
            {copiado ? '✓ Copiado' : '📋 Copiar p/ prontuário'}
          </button>
          {avAtual.conduta?.startsWith('hd') && (
            <button style={{ ...S.btn, background: '#c0392b', color: 'white' }} onClick={() => setView('prescricao')}>Prescrição</button>
          )}
        </div>
      </div>
    );
  }

  return <div style={{ padding: 40, textAlign: 'center', color: '#888' }}>Carregando...</div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NefroApp />);
</script>
</body>
</html>
