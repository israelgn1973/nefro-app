const parseRelEnf = (txt) => {
  const completo = String(txt || '');
  const assin = completo.match(/T[ée]cnic[oa]\s*[:\-][^\n]*/i);
  const corte = assin ? completo.indexOf(assin[0]) + assin[0].length : completo.length;
  const t = completo.slice(0, corte);
  const resto = completo.slice(corte).trim();
  const nPacientes = (completo.match(/Paciente\s*[:\-]/gi) || []).length;
  const pega = (re) => { const m = t.match(re); return m ? m[1].trim() : ''; };
  const nome = pega(/\*?Paciente\*?\s*[:\-]\s*(.+)/i);
  const uti = pega(/\*?Uti\*?\s*[:\-]\s*(.+)/i);
  const leito = pega(/\*?Leito\*?\s*[:\-]\s*(.+)/i);
  const data = pega(/(\d{2}\/\d{2}\/\d{4})/);
  const tempoRaw = pega(/\*?Tempo\*?\s*[:\-]\s*([\d:hH., ]+)/i);
  const tempoDig = (tempoRaw.match(/\d+[:h]?\d*/) || [''])[0].replace(/[^\d]/g, '');
  const tempo = tempoDig ? fmtDur(tempoDig.length === 1 || tempoDig.length === 2 && parseInt(tempoDig) <= 12 ? tempoDig.replace(/^0/, '') : tempoDig) : '';
  const ufTotal = pega(/Uf\s*total\*?\s*[:\-]\s*([\d.]+)/i).replace(/\./g, '');
  const ufEfetiva = pega(/Uf\s*efetiva\*?\s*[:\-]\s*([\d.]+)/i).replace(/\./g, '');
  const ini = pega(/In[ií]cio\s*[:\-]\s*(\d{1,2}[:h]\d{2})/i).replace('h', ':');
  const fim = pega(/Final?\s*[:\-]\s*(\d{1,2}[:h]\d{2})/i).replace('h', ':');
  let durCalc = '';
  if (ini && fim) {
    const [h1, m1] = ini.split(':').map(Number), [h2, m2] = fim.split(':').map(Number);
    let min = (h2 * 60 + m2) - (h1 * 60 + m1); if (min < 0) min += 1440;
    durCalc = Math.floor(min / 60) + ':' + String(min % 60).padStart(2, '0');
  }
  const livreM = t.match(/Evolu[çc][aã]o de Enfermagem\.?([\s\S]*?)(?:T[ée]cnic[oa]|$)/i);
  const livre = livreM ? livreM[1].trim() : '';
  return { nome, uti, leito, data, tempo, ufTotal, ufEfetiva, ini, fim, durCalc, livre, temResto: resto.length > 3, multiplos: nPacientes > 1 };
};
const mapRelParaRegistro = (rc, divergencia) => {
  const L = (rc.livre || '').toLowerCase();
  const interc = [];
  if (/hipotens/.test(L)) interc.push('Hipotensão');
  if (/hipertens/.test(L)) interc.push('Hipertensão');
  if (/c[aâ]imbra/.test(L)) interc.push('Câimbras');
  if (/coagul/.test(L)) interc.push('Coagulação do circuito');
  if (/sangra/.test(L)) interc.push('Sangramento');
  if (/calafrio|febre/.test(L)) interc.push('Calafrios/febre');
  if (/rebaixa/.test(L)) interc.push('Rebaixamento');
  if (/convuls/.test(L)) interc.push('Convulsão');
  if (/n[aá]usea|v[oô]mit/.test(L)) interc.push('Náuseas/vômitos');
  if (/sem fluxo|mal fluxo|mau fluxo|vias invertidas|disfun[çc][aã]o de acesso/.test(L)) interc.push('Disfunção de acesso');
  const grave = /suspens|interromp|n[aã]o realizada|pcr/.test(L);
  let destino = null, motivo = '';
  if (grave) { destino = null; }
  else if (divergencia) {
    destino = 'parcial';
    if (/pcr/.test(L)) motivo = 'PCR';
    else if (/hipotens|instabilidade/.test(L)) motivo = 'Instabilidade hemodinâmica';
    else if (/coagul/.test(L)) motivo = 'Coagulação do circuito';
    else if (/sangra/.test(L)) motivo = 'Sangramento';
    else if (/rebaixa/.test(L)) motivo = 'Rebaixamento';
    else if (/calafrio/.test(L)) motivo = 'Calafrios/reação';
    else if (/sem fluxo|mal fluxo|mau fluxo/.test(L)) motivo = 'CDL sem fluxo';
  }
  else if (/conclu[ií]da|finalizada|encerrada/.test(L)) destino = 'conforme';
  if (!interc.length && /sem (demais |mais )?intercorr/.test(L)) interc.push('Nenhuma');
  return { destino, motivo, interc };
};
const verificarRelEnf = (c) => {
  const A = [];
  const ufT = parseFloat(c.ufTotal), ufE = parseFloat(c.ufEfetiva);
  if (!isNaN(ufT) && !isNaN(ufE) && ufE > ufT)
    A.push({ n: 'erro', m: `UF efetiva (${c.ufEfetiva}) MAIOR que a UF total (${c.ufTotal}) — impossível; provável troca na anotação.` });
  if (!isNaN(ufE) && ufE > 5000)
    A.push({ n: 'erro', m: `UF efetiva de ${c.ufEfetiva} ml é implausível — conferir dígitos.` });
  const dur = c.durCalc || c.tempo;
  if (dur) { const h = durHoras(dur); if (h < 1 || h > 8) A.push({ n: 'aviso', m: `Duração de ${dur} fora do usual (1–8h) — conferir horários.` }); }
  if (c.data) {
    const [dd, mm, aa] = c.data.split('/').map(Number);
    const dt = new Date(aa, mm - 1, dd, 12);
    const dif = Math.round((dt - new Date()) / 86400000);
    if (dif > 0) A.push({ n: 'erro', m: `Data ${c.data} está no FUTURO — anotação errada.` });
    else if (dif < -3) A.push({ n: 'aviso', m: `Data ${c.data} tem mais de 3 dias — relatório antigo ou data errada (mês trocado é o erro mais comum).` });
  }
  if (!isNaN(ufE) && ufE === 0 && !isNaN(ufT) && ufT > 0)
    A.push({ n: 'aviso', m: 'UF efetiva = 0 com UF total > 0 — sessão sem retirada (intencional?) ou anotação trocada.' });
  if (c.multiplos)
    A.push({ n: 'aviso', m: 'O texto colado contém MAIS DE UM relatório — analisei apenas o primeiro. Cole um por vez.' });
  if (c.temResto)
    A.push({ n: 'texto', m: 'Mensagens após a assinatura do técnico foram IGNORADAS (respostas do grupo — podem ser de outro paciente).' });
  const palavras = [['suspens', 'sessão SUSPENSA mencionada'], ['hipotens', 'hipotensão'], ['instabilidade', 'instabilidade'], ['coagul', 'coagulação'], ['sangra', 'sangramento'], ['pcr', 'PCR'], ['calafrio', 'calafrios'], ['sem fluxo', 'CDL sem fluxo'], ['mal fluxo', 'mau fluxo do CDL'], ['vias invertidas', 'vias invertidas'], ['interromp', 'interrupção'], ['não realizada', 'não realizada'], ['encerrada precoce', 'encerramento precoce']];
  const achadas = palavras.filter(([k]) => c.livre.toLowerCase().includes(k)).map(([, r]) => r);
  if (achadas.length)
    A.push({ n: 'texto', m: 'No texto da enfermagem: ' + [...new Set(achadas)].join(' · ') + ' — confira antes de marcar o destino da sessão.' });
  return A;
};
const fmtDur = (d) => {
  d = String(d || '').replace(/\D/g, '').slice(0, 4);
  if (!d) return '';
  if (d.length === 1) return d + ':00';
  if (d.length === 2) return d[0] + ':' + d[1] + '0';
  return d.slice(0, d.length - 2) + ':' + d.slice(-2);
};
const durHoras = (s) => {
  s = String(s || '');
  if (s.includes(':')) { const [h, m] = s.split(':'); return (parseInt(h) || 0) + ((parseInt(m) || 0) / 60); }
  return parseFloat(s.replace(',', '.')) || 0;
};
const fmtDec = (v) => {
  v = String(v || '').trim();
  if (!v) return '';
  if (v.includes(',') || v.includes('.')) return v.replace('.', ',');
  if (v.length === 1) return v + ',0';
  return v[0] + ',' + v.slice(1, 3);
};
const dataLocalISO = (ts) => { const d = ts == null ? new Date() : new Date(ts); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };
const nomeContido = (parcial, completo) => {
  const a = nrmNome(parcial).split(' ').filter(Boolean);
  const b = nrmNome(completo).split(' ').filter(Boolean);
  if (!a.length || a.length >= b.length) return false;
  let i = 0;
  for (const tk of b) { if (tk === a[i]) i++; if (i === a.length) return true; }
  return false;
};
const nrmNome = s => (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toLowerCase().replace(/\s+/g, ' ');
const FREQ_KEY = 'nefroapp_freq_v1';
const lerFreq = () => { try { return JSON.parse(localStorage.getItem(FREQ_KEY)) || {}; } catch { return {}; } };
const regFreq = (campo, opcao) => {
  try {
    const f = lerFreq();
    f[campo] = f[campo] || {};
    f[campo][opcao] = (f[campo][opcao] || 0) + 1;
    localStorage.setItem(FREQ_KEY, JSON.stringify(f));
  } catch {}
};
const topFreq = (campo, n = 5) => {
  const f = lerFreq()[campo] || {};
  return Object.entries(f).filter(([, c]) => c >= 2).sort((a, b) => b[1] - a[1]).slice(0, n).map(([o]) => o);
};
function FavRow({ campo, ativos, onPick, cor = '#1a3a5c', max = 5 }) {

            onClick={() => onPick(o)}>{o}</span>
        ))}

    </div>
  );
}

  const fmtPA = (d) => {
    d = (d||'').replace(/\D/g, '').slice(0, 6);
    if (d.length >= 5) return d.slice(0, 3) + '/' + d.slice(3);
    if (d.length === 4) return d.slice(0, 2) + '/' + d.slice(2);
    return d;
  };
  const disp = pad.mode === 'pa' ? fmtPA(pad.value) : pad.mode === 'dur' ? (fmtDur(pad.value) || pad.value) : pad.value;
  const hintEl = pad.hint ? <div style={{ background: '#fef5e7', border: '1px solid #f0d9b5', borderRadius: 8, padding: '7px 10px', fontSize: 12.5, color: '#7a5c1e', marginBottom: 8 }}>💡 {pad.hint}</div> : null;
  const press = (k) => {
    if (k === 'back') onChange(pad.value.slice(0, -1));
    else if (k === ',') { if (pad.allowComma && !pad.value.includes(',')) onChange(pad.value + ','); }
    else onChange((pad.value + k).slice(0, pad.mode === 'pa' ? 6 : 8));
  };
  const ok = () => { const limpo = pad.mode === 'pa' ? fmtPA(pad.value) : pad.value.replace(/^0+(?=\d)/, ''); pad.onSet(limpo); onClose(); };
  return (
    <div style={{ position: 'fixed', left: 0, right: 0, bottom: 0, background: 'white', boxShadow: '0 -4px 20px rgba(0,0,0,0.18)', borderRadius: '16px 16px 0 0', padding: '12px 16px 20px', zIndex: 1000, maxWidth: 480, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5 }}>{pad.label}</span>
        <span onClick={onClose} style={{ fontSize: 16, color: '#888', cursor: 'pointer', padding: 4 }}>✕</span>
      </div>
      {hintEl}
      <div style={{ textAlign: 'center', fontSize: 28, fontWeight: 700, color: '#1a3a5c', minHeight: 36, marginBottom: 10 }}>{disp || <span style={{ color: '#ccc' }}>—</span>}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {['1','2','3','4','5','6','7','8','9', pad.allowComma ? ',' : '', '0', 'back'].map((k, i) => k === '' ? <span key={i} /> : (
          <button key={i} onClick={() => press(k)}
            style={{ padding: '12px 0', fontSize: 20, fontWeight: 600, border: '1px solid #eee', borderRadius: 10, background: '#fafbfc', cursor: 'pointer' }}>
            {k === 'back' ? '⌫' : k}
          </button>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
        <button onClick={() => onChange('')} style={{ flex: 1, padding: 12, borderRadius: 10, border: '1px solid #e0c0bc', background: '#fdf4f3', color: '#c0392b', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>C limpar</button>
        <button onClick={ok} style={{ flex: 2, padding: 12, borderRadius: 10, border: 'none', background: '#1a3a5c', color: 'white', fontWeight: 700, fontSize: 16, cursor: 'pointer' }}>OK</button>
      </div>
    </div>
  );
}

function ChipSelect({ label, options, value, onSelect, color = '#1a3a5c', herdado = false }) {

          <span style={{ ...S.checkItem, fontSize: 12, background: color, color: 'white', borderColor: color }}>{value}</span>

}

  function importarDados(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.pacientes) { alert('Arquivo inválido.'); return; }
        const qtd = d.pacientes.length;
        if (confirm(`Importar ${qtd} paciente(s) mesclando com os atuais? Pacientes existentes são mantidos; em coincidências vale o registro mais recente.`)) {
          // vencedor por paciente: o lado com updatedAt mais recente
          const recencia = p => p.updatedAt || 0;
          const novosVence = {};
          const mapaPac = {};
          pacientes.forEach(p => { mapaPac[p.id] = p; });
          d.pacientes.forEach(p => {
            if (!mapaPac[p.id] || recencia(p) >= recencia(mapaPac[p.id])) { mapaPac[p.id] = p; novosVence[p.id] = true; }
          });
          const pacMerged = Object.values(mapaPac);

          const avMerged = { ...avaliacoes };
          const dia = a => { try { return dataLocalISO(a.data); } catch { return String(a.data); } };
          Object.entries(d.avaliacoes || {}).forEach(([pid, avsImp]) => {
            const atuais = avMerged[pid] || [];
            const porDia = {};
            atuais.forEach(a => { porDia[dia(a)] = a; });
            (avsImp || []).forEach(a => {
              const k = dia(a);
              if (!porDia[k] || novosVence[pid]) porDia[k] = a; // coincidência de dia: vale o lado do paciente mais recente
            });
            avMerged[pid] = Object.values(porDia).sort((x, y) => new Date(y.data) - new Date(x.data));
          });

          setPacientes(pacMerged);
          setAvaliacoes(avMerged);
          const homs = [];
          pacMerged.forEach((p, i) => pacMerged.slice(i + 1).forEach(q => {
            if (nrmNome(p.nome) === nrmNome(q.nome) && String(p.idade || '') === String(q.idade || '')) homs.push(p.nome);
          }));
          alert(`Importação concluída: ${pacMerged.length} paciente(s) no app.` + (homs.length ? `\n\nAtenção — possíveis duplicados (homônimos com mesma idade): ${[...new Set(homs)].join(', ')}. Estão marcados na lista; arraste para a esquerda o registro que não quer manter e exclua.` : ''));
        }
      } catch (err) { alert('Erro ao ler o arquivo.'); }
    };
    reader.readAsText(file);
  }

      const liga = (meds, motivo) => {
        const atual = novo.med_revisar || [];
        const add = meds.filter(m => !atual.includes(m));
        if (add.length) { novo.med_revisar = [...atual, ...add]; novo.med_auto_motivo = motivo; }
      };
      if (key === 'pot_hoje' && !isNaN(n) && n >= 5.5)
        liga(['IECA', 'BRA', 'Entresto', 'Espironolactona', 'Reposição de K+'], `K ${val} — retentores de K+ marcados para revisão`);
      if (key === 'creat_hoje' && !isNaN(n)) {
        const ant = parseFloat(String(novo.labs.creat_ant ?? '').replace(',', '.'));
        if (n >= 2 || (!isNaN(ant) && n - ant >= 0.3))
          liga(['AINEs', 'Anfotericina B', 'Amicacina', 'Polimixina B', 'Metformina', 'Enoxaparina'], `Creatinina ${val}${!isNaN(ant) ? ' (antes ' + novo.labs.creat_ant + ')' : ''} — nefrotóxicos/acumuláveis marcados`);
      }
      return novo;
    });
  }

  const avs = pacAtual ? (avaliacoes[pacAtual.id] || []) : [];
  const ultimaAv = avs[0];

  // ── VIEWS ──
  const modalPaciente = showModal ? (
        <div style={S.modal} onClick={e => { if (e.target === e.currentTarget) { setShowModal(false); setEditandoPacId(null); } }}>

                      onClick={() => setNovoPac(n => {

                      })}>{c}</span>
                  ))}
                </div>
                <input style={{ ...S.input, textAlign: 'left', fontSize: 13, width: '100%', boxSizing: 'border-box' }} type="text"
                  value={novoPac.causa_internacao || ''} onChange={e => setNovoPac(n => ({ ...n, causa_internacao: e.target.value }))}
                  placeholder="ou descreva a causa…" />
                <input style={{ ...S.input, textAlign: 'left', fontSize: 13, width: '100%', boxSizing: 'border-box', marginTop: 6 }} type="text"
                  value={novoPac.causa_atual || ''} onChange={e => setNovoPac(n => ({ ...n, causa_atual: e.target.value }))}
                  placeholder="atualização — motivo atual da internação (se mudou)" />
              </div>
              <FormRow label="Idade">
                <NumInput value={novoPac.idade} onSet={v => setNovoPac(n => ({...n, idade: v}))} placeholder="anos" label="Idade" />
              </FormRow>
              <FormRow label="Sexo">
                <div style={{ display: 'flex', gap: 8 }}>
                  {['M','F'].map(s => (

                      onClick={() => setNovoPac(n => ({ ...n, sexo: s }))}>{s}</span>
                  ))}
                </div>
              </FormRow>
              <FormRow label="Convênio">
                <select style={S.select} value={novoPac.convenio} onChange={e => setNovoPac(n => ({...n, convenio: e.target.value}))}>
                  <option value="SUS">SUS</option>
                  {CONVENIOS.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </FormRow>
              {novoPac.convenio === 'OUTROS' && (
                <FormRow label="Qual?">
                  <input style={S.input} type="text" value={novoPac.convenioOutro} onChange={e => setNovoPac(n => ({...n, convenioOutro: e.target.value}))} placeholder="Nome do convênio" />
                </FormRow>
              )}
              </div>
            <div style={{ padding: '8px 14px 0', display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ ...S.checkItem, fontSize: 12, ...(novoPac.externo ? { background: '#7d6608', color: 'white', borderColor: '#7d6608' } : {}) }}
                onClick={() => setNovoPac(n => ({ ...n, externo: !n.externo, ...(n.externo ? {} : { uti: '' }) }))}>🏥 Fora do HRA</span>
              {novoPac.externo && (
                <input style={{ ...S.input, textAlign: 'left', fontSize: 13, flex: 1 }} type="text" value={novoPac.externoLocal || ''}
                  onChange={e => setNovoPac(n => ({ ...n, externoLocal: e.target.value }))} placeholder="Hospital / local" />
              )}
            </div>
            {!novoPac.externo && <div style={S.formLabel}>UTI</div>}
            <div style={{ ...S.formGroup, marginBottom: 12 }}>
              <div style={S.utiGrid}>
                {UTIs.map(u => (
                  <span key={u} style={{ ...S.utiBadge, ...(novoPac.uti === u ? { background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' } : {}) }}
                    onClick={() => setNovoPac(n => ({ ...n, uti: u }))}>{u}</span>
                ))}
              </div>
              <div style={{ borderTop: '1px solid #f0f0f0', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
                <span onClick={() => setNovoPac(n => ({ ...n, temLeito: !n.temLeito, leito: !n.temLeito ? n.leito : '' }))}
                  style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 14 }}>
                  <span style={{ width: 20, height: 20, borderRadius: 4, border: '1.5px solid #ccc', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: novoPac.temLeito ? '#1a3a5c' : 'white', color: 'white', fontSize: 13 }}>{novoPac.temLeito ? '✓' : ''}</span>
                  Leito (fora da UTI)
                </span>
                {novoPac.temLeito && (
                  <input style={{ ...S.input, flex: 1, maxWidth: 120 }} type="text" value={novoPac.leito} onChange={e => setNovoPac(n => ({...n, leito: e.target.value}))} placeholder="Nº leito" />
                )}
              </div>
            </div>
            <button style={{ ...S.btn, background: '#1a3a5c', color: 'white', width: '100%' }} onClick={salvarNovoPaciente}>{editandoPacId ? 'Salvar alterações' : 'Cadastrar'}</button>
            {editandoPacId && modalComExcluir && (

                onClick={() => {

                  const nome = (pacientes.find(p => p.id === editandoPacId) || {}).nome || '';
                  if (!confirm(`Excluir ${nome}?`)) return;
                  if (!confirm(`Tem certeza? Serão apagadas ${n} evolução(ões). Esta ação NÃO pode ser desfeita.`)) return;
                  setPacientes(ps => ps.filter(p => p.id !== editandoPacId));
                  setAvaliacoes(av => { const novo = { ...av }; delete novo[editandoPacId]; return novo; });
                  setShowModal(false); setEditandoPacId(null); setPacAtual(null); setAvAtual(null); setView('lista');
                }}>
                🗑 Excluir paciente
              </button>
            )}
          </div>
        </div>
  ) : null;

  const infoHD = (() => {
    const hojeISO = dataLocalISO();
    const ontemISO = dataLocalISO(Date.now() - 86400000);
    const ds = new Date().getDay();
    const m = {};
    pacientes.forEach(p => {
      const avsP = avaliacoes[p.id] || [];
      const diaDe = a => dataLocalISO(a.data);
      const avHoje = avsP.find(a => diaDe(a) === hojeISO);
      const avOntem = avsP.find(a => diaDe(a) === ontemISO);
      const temPrescricao = avsP.some(a => a.conduta === 'hd_hoje');
      let motivo = null;
      if (temPrescricao && avHoje?.conduta !== 'hd_hoje') {
        if (avOntem?.conduta === 'hd_amanha') motivo = 'ontem: HD amanhã';
        else if (avOntem?.conduta === 'hd_hoje') motivo = 'dialisou ontem';
        else if (p.esquemaHD === 'diaria') motivo = 'esquema diário';
        else if (p.esquemaHD === 'sqs' && [1,3,5].includes(ds)) motivo = 'esquema Seg/Qua/Sex';
        else if (p.esquemaHD === 'tqs' && [2,4,6].includes(ds)) motivo = 'esquema Ter/Qui/Sáb';
      }
      let amanha = null;
      if (temPrescricao && p.esquemaHD !== 'susp') {
        const dsAm = (ds + 1) % 7;
        if (avHoje?.conduta === 'hd_amanha') amanha = 'conduta de hoje: HD amanhã';
        else if (avHoje?.conduta === 'hd_hoje') amanha = 'dialisou hoje';
        else if (p.esquemaHD === 'diaria') amanha = 'esquema diário';
        else if (p.esquemaHD === 'sqs' && [1,3,5].includes(dsAm)) amanha = 'esquema Seg/Qua/Sex';
        else if (p.esquemaHD === 'tqs' && [2,4,6].includes(dsAm)) amanha = 'esquema Ter/Qui/Sáb';
      }
      const ultAv = avsP[0];
      const TERMINAIS = ['alta_nefro', 'alta_hosp', 'paliativo', 'obito'];
      const arquivado = !!(ultAv && TERMINAIS.includes(ultAv.conclusao) && (!p.reativadoEm || p.reativadoEm < ultAv.data));
      const homonimo = pacientes.some(q => q.id !== p.id && nrmNome(q.nome) === nrmNome(p.nome) && String(q.idade || '') === String(p.idade || ''));
      const relAberto = (p.relEnf || []).find(r => !r.usadoEm);
      const relPendente = !!relAberto;
      const relDivergente = relAberto?.divergencia || null;
      const ultHDPrescrita = avsP.find(a => a.conduta === 'hd_hoje' && dataLocalISO(a.data) < dataLocalISO());
      const faltaRelatorio = !!(ultHDPrescrita && !(p.relEnf || []).some(r => r.criadoEm > ultHDPrescrita.data) && !avHoje?.hd_destino && (Date.now() - ultHDPrescrita.data) < 3 * 86400000);
      m[p.id] = { condutaHoje: !!avHoje?.conduta, hdHoje: avHoje?.conduta === 'hd_hoje', relPendente, relDivergente, faltaRelatorio, homonimo, vistoHoje: !!avHoje, arquivado, conclusaoFinal: ultAv?.conclusao, motivo, amanha, prioridadeOntem: avOntem?.prioridade === 'sim' && avHoje?.conduta !== 'hd_hoje', suspensa: p.esquemaHD === 'susp' };
    });
    return m;
  })();

  if (view === 'pep') {
    const diasDisp = [];
    for (let i = 0; i < 7; i++) diasDisp.push(dataLocalISO(Date.now() - i * 86400000));
    const dia = diaPep || diasDisp[0];
    const itens = [];
    pacientes.forEach(p => {
      const av = (avaliacoes[p.id] || []).find(a => dataLocalISO(a.data) === dia);
      if (av) itens.push({ p, av });
    });
    const rotDia = d => d.split('-').reverse().slice(0, 2).join('/');
    const copiarUm = (p, av) => {
      const txt = p.nome + ' — ' + new Date(av.data).toLocaleDateString('pt-BR') + '\n\n' + gerarTextoPanorama(av, p);
      navigator.clipboard?.writeText(txt).then(() => alert('Evolução de ' + p.nome + ' copiada — cole no PEP.'), () => alert('Não foi possível copiar.'));
    };
    return (
      <div style={S.app}>
        <div style={S.header}>
          <button style={S.backBtn} onClick={() => setView('lista')}>‹</button>
          <h1 style={S.h1}>📄 Evoluções p/ PEP</h1>
        </div>
        <div style={{ padding: 16 }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
            {diasDisp.map(d => (
              <span key={d} style={{ ...S.checkItem, fontSize: 12, ...(d === dia ? { background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' } : {}) }}
                onClick={() => setDiaPep(d)}>{d === diasDisp[0] ? 'hoje' : rotDia(d)}</span>
            ))}
          </div>
          {!itens.length
            ? <div style={{ color: '#888', fontSize: 13, padding: 20, textAlign: 'center' }}>Nenhuma evolução neste dia.</div>
            : itens.map(({ p, av }) => (
              <div key={p.id} style={{ ...S.card, marginBottom: 10 }}>
                <div style={{ ...S.cardHeader, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>{p.nome}{p.uti ? ' · UTI ' + p.uti : ''}</span>
                  <span onClick={() => copiarUm(p, av)} style={{ ...S.checkItem, fontSize: 12, background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' }}>📋 Copiar</span>
                </div>
                <div style={{ padding: '8px 14px', fontSize: 11.5, color: '#777', whiteSpace: 'pre-wrap', maxHeight: 120, overflow: 'hidden', lineHeight: 1.5 }}>
                  {gerarTextoPanorama(av, p).slice(0, 400)}…
                </div>
              </div>
            ))}
          <div style={{ fontSize: 11.5, color: '#999', marginTop: 6 }}>Um toque em Copiar por paciente → colar no PEP. A prévia é truncada; o texto copiado é completo.</div>
        </div>
      </div>
    );
  }

  if (view === 'stats') {
    const mesesDisp = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      mesesDisp.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    }
    const mes = mesStats || mesesDisp[0];
    const noMes = ts => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === mes; };
    const idsExternos = new Set(pacientes.filter(p => p.externo).map(p => p.id));
    const todasAvs = Object.entries(avaliacoes).filter(([pid]) => !idsExternos.has(pid)).flatMap(([pid, avs]) => (avs || []).map(a => ({ ...a, pid })));
    const avsMes = todasAvs.filter(a => noMes(a.data));
    const pacsUnicos = [...new Set(avsMes.map(a => a.pid))];
    const novos = pacientes.filter(p => noMes(parseInt((p.id || '').split('_')[1]) || p.updatedAt || 0)).length;
    const hds = avsMes.filter(a => a.conduta === 'hd_hoje');
    const urgentes = hds.filter(a => a.prioridade === 'sim');
    const diasComAv = [...new Set(avsMes.map(a => dataLocalISO(a.data)))].length;
    const desf = { alta_nefro: 0, alta_hosp: 0, paliativo: 0, obito: 0 };
    pacsUnicos.forEach(pid => {
      const ult = (avaliacoes[pid] || [])[0];
      if (ult && noMes(ult.data) && desf[ult.conclusao] != null) desf[ult.conclusao]++;
    });
    const concluidos = desf.alta_nefro + desf.alta_hosp + desf.paliativo + desf.obito;
    const mort = concluidos ? Math.round(100 * desf.obito / concluidos) : null;
    const rotMes = m => { const [a, mm] = m.split('-'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(mm)-1] + '/' + a; };
    const copiar = () => {
      const L = [];
      L.push(`RELATÓRIO NEFROLOGIA UTI — ${rotMes(mes)}`);
      L.push('');
      L.push(`Evoluções: ${avsMes.length}`);
      L.push(`Pacientes acompanhados: ${pacsUnicos.length}`);
      L.push(`Pacientes novos: ${novos}`);
      L.push(`Dias com atividade: ${diasComAv}`);
      L.push('');
      L.push(`Sessões de HD prescritas: ${hds.length}`);
      L.push(`HD urgentes: ${urgentes.length}`);
      L.push('');
      L.push(`Desfechos no mês — alta da nefrologia: ${desf.alta_nefro} · alta hospitalar: ${desf.alta_hosp} · paliativos: ${desf.paliativo} · óbitos: ${desf.obito}`);
      if (mort != null) L.push(`Mortalidade entre concluídos: ${mort}%`);
      L.push('');
      L.push('Fonte: registros do NefroApp (atividade do nefrologista).');
      navigator.clipboard?.writeText(L.join('\n')).then(() => alert('Relatório copiado.'), () => alert('Não foi possível copiar.'));
    };
    const Cartao = ({ n, l }) => (
      <div style={{ flex: '1 1 28%', background: 'white', borderRadius: 12, padding: '14px 10px', textAlign: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.07)' }}>
        <div style={{ fontSize: 26, fontWeight: 800, color: '#1a3a5c' }}>{n}</div>
        <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{l}</div>
      </div>
    );
    return (
      <div style={S.app}>
        <div style={S.header}>
          <button style={S.backBtn} onClick={() => setView('lista')}>‹</button>
          <h1 style={S.h1}>📊 Relatório do serviço</h1>
        </div>
        <div style={{ padding: 16 }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
            {mesesDisp.map(m => (
              <span key={m} style={{ ...S.checkItem, fontSize: 12, ...(m === mes ? { background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' } : {}) }}
                onClick={() => setMesStats(m)}>{rotMes(m)}</span>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Cartao n={avsMes.length} l="evoluções" />
            <Cartao n={pacsUnicos.length} l="pacientes" />
            <Cartao n={novos} l="novos" />
            <Cartao n={hds.length} l="HD prescritas" />
            <Cartao n={urgentes.length} l="HD urgentes" />
            <Cartao n={diasComAv} l="dias ativos" />
            <Cartao n={desf.alta_nefro + desf.alta_hosp} l="altas" />
            <Cartao n={desf.obito} l="óbitos" />
            <Cartao n={mort != null ? mort + '%' : '—'} l="mortalidade*" />
          </div>
          <div style={{ fontSize: 11, color: '#999', marginTop: 12, lineHeight: 1.5 }}>
            * entre pacientes com desfecho registrado no mês. Os números refletem a atividade registrada no app — produtividade é exata; desfechos são do recorte acompanhado pela nefrologia, não da UTI inteira.
          </div>
          <button onClick={copiar} style={{ ...S.btn, background: '#1a3a5c', color: 'white', width: '100%', marginTop: 14 }}>📋 Copiar relatório em texto</button>
        </div>
      </div>
    );
  }

  if (view === 'lista') return (
    <div style={S.app}>{numPadEl}
      <div style={S.header}>
        <h1 style={S.h1}>Nefrologia UTI <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.6 }}>v134</span></h1>
        <button style={S.headerBtn} onClick={() => setShowModal(true)}>+ Paciente</button>
      </div>


      {(() => {
        const hojeISO = dataLocalISO();
        const ontemISO = dataLocalISO(Date.now() - 86400000);
        const pendentes = pacientes.filter(p => (infoHD[p.id]?.motivo || infoHD[p.id]?.prioridadeOntem) && !infoHD[p.id]?.condutaHoje && !infoHD[p.id]?.arquivado).length;
        const prescritasHoje = pacientes.filter(p => infoHD[p.id]?.hdHoje && !infoHD[p.id]?.arquivado).length;
        if (!pendentes && !prescritasHoje && !filtroHD) return null;
        return (
          <div style={{ padding: '10px 16px 0' }}>
            {pendentes > 0 || filtroHD ? (
              <button onClick={() => setFiltroHD(f => !f)}
                style={{ width: '100%', padding: 10, borderRadius: 10, border: '1.5px solid #c0392b', background: filtroHD ? '#c0392b' : '#fdf0ef', color: filtroHD ? 'white' : '#c0392b', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
                💧 Provável HD hoje ({pendentes} sem conduta definida) {filtroHD ? '— mostrando só estes · toque p/ ver todos' : ''}
              </button>
            ) : (
              <div style={{ width: '100%', padding: 10, borderRadius: 10, border: '1.5px solid #b9d2ee', background: '#eef4fb', color: '#1a3a5c', fontWeight: 700, fontSize: 13, textAlign: 'center' }}>
                ✓ Condutas definidas — {prescritasHoje} HD prescrita{prescritasHoje === 1 ? '' : 's'} hoje
              </div>
            )}
          </div>
        );
      })()}

      {(() => {
        const ativos = pacientes.filter(p => !infoHD[p.id]?.arquivado && !p.externo);
        const todosVistos = ativos.length > 0 && ativos.every(p => infoHD[p.id]?.vistoHoje);
        const hojeISO = dataLocalISO();
        let ultBkp = '', devido = '';
        try {
          ultBkp = localStorage.getItem('nefroapp_last_backup') || '';
          devido = localStorage.getItem('nefroapp_bkp_devido') || '';
          if (todosVistos && devido !== hojeISO) { localStorage.setItem('nefroapp_bkp_devido', hojeISO); devido = hojeISO; }
        } catch {}
        if (devido !== hojeISO || ultBkp === hojeISO || bkpHoje === hojeISO) return null;
        return (
          <div style={{ margin: '10px 16px 0', padding: '12px 14px', borderRadius: 10, background: '#eafaf1', border: '1.5px solid #27ae60', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ flex: 1, fontSize: 13, color: '#1d7a45', fontWeight: 600 }}>✅ Todos os pacientes vistos. Faça o backup de hoje.</span>
            <span onClick={() => { exportarDados(); setBkpHoje(dataLocalISO()); }} style={{ ...S.checkItem, fontSize: 12, background: '#27ae60', color: 'white', borderColor: '#27ae60' }}>⬆ Backup</span>
            <span onClick={() => { try { localStorage.setItem('nefroapp_last_backup', dataLocalISO()); } catch {} setBkpHoje(dataLocalISO()); }} style={{ fontSize: 15, color: '#1d7a45', padding: '0 4px', cursor: 'pointer' }}>✕</span>
          </div>
        );
      })()}

      {(() => {
        const ams = pacientes.filter(p => infoHD[p.id]?.amanha);
        if (!ams.length) return null;
        return (
          <div style={{ ...S.card, marginTop: 10, border: '1.5px solid #8e7cc3' }}>
            <div onClick={() => setVerAmanha(v => !v)}
              style={{ padding: '10px 16px', background: '#f4f0fb', fontSize: 13, fontWeight: 700, color: '#5e4b8b', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }}>
              <span>🌙 HD previstas para amanhã ({ams.length})</span>
              <span>{verAmanha ? '▲' : '▼'}</span>
            </div>
            {verAmanha && ams.map(p => (
              <div key={p.id} style={S.patientItem} onClick={() => abrirPaciente(p)}>
                <div style={{ flex: 1 }}>
                  <div style={S.patientName}>{p.nome}</div>
                  <div style={S.patientMeta}>{p.uti && `UTI ${p.uti} · `}{infoHD[p.id].amanha}</div>
                </div>
                <span style={{ marginLeft: 8, color: '#ccc', fontSize: 20 }}>›</span>
              </div>
            ))}
          </div>
        );
      })()}

      {(() => {
        const ativos = pacientes.filter(p => !infoHD[p.id]?.arquivado && !p.externo);
        if (!ativos.length) return null;
        const vistos = ativos.filter(p => infoHD[p.id]?.vistoHoje).length;
        const provaveis = ativos.filter(p => infoHD[p.id]?.motivo && !infoHD[p.id]?.condutaHoje).length;
        const prior = ativos.filter(p => infoHD[p.id]?.prioridadeOntem).length;
        const semEvol = ativos.filter(p => {
          const ult = (avaliacoes[p.id] || [])[0];
          return !ult || (Date.now() - ult.data) > 2 * 86400000;
        }).length;
        return (
          <div style={{ margin: '12px 16px 0', padding: '10px 14px', borderRadius: 10, background: '#1a3a5c', color: 'white', fontSize: 12.5, lineHeight: 1.6 }}>
            ☀️ <b>{vistos}/{ativos.length}</b> evoluídos hoje{provaveis ? <> · 💧 <b>{provaveis}</b> provável{provaveis > 1 ? 'is' : ''} HD</> : null}{prior ? <> · ⚠ <b>{prior}</b> prioridade de ontem</> : null}{semEvol ? <> · 🕐 <b>{semEvol}</b> sem evolução há 2d+</> : null}
          </div>
        );
      })()}

      <div style={{ margin: '8px 16px 0', display: 'flex', gap: 8, alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: '#888', whiteSpace: 'nowrap' }}>🔍 por data:</span>
        <input type="date" value={buscaData} onChange={e => setBuscaData(e.target.value)}
          style={{ ...S.input, textAlign: 'left', fontSize: 13, flex: 1 }} />
        {buscaData && <span onClick={() => setBuscaData('')} style={{ ...S.checkItem, fontSize: 12 }}>✕ limpar</span>}
      </div>
      {buscaData && (
        <div style={{ margin: '6px 16px 0', fontSize: 12, color: '#1a3a5c', background: '#eef4fb', border: '1px solid #b9d2ee', borderRadius: 8, padding: '6px 10px' }}>
          Mostrando pacientes com evolução em {buscaData.split('-').reverse().join('/')} — toque no nome e use 👁 consultar.
        </div>
      )}
      <div style={{ margin: '8px 16px 0' }}>
        <button onClick={() => setCaixaRel({ raw: '', campos: null, pacId: null })}
          style={{ ...S.btn, background: 'white', color: '#1a3a5c', border: '1.5px dashed #b9d2ee', width: '100%', fontSize: 13 }}>
          📬 Caixa de relatórios da enfermagem — colar novo
        </button>
      </div>

      {coletivoHtml && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 9999, background: '#fff', display: 'flex', flexDirection: 'column' }}>
          <div style={{ display: 'flex', gap: 10, padding: '12px 14px', paddingTop: 'max(12px, env(safe-area-inset-top))', background: '#1a3a5c', alignItems: 'center' }}>
            <button style={{ ...S.btn, background: '#f0f0f0', flex: '0 0 auto', padding: '10px 16px' }} onClick={() => setColetivoHtml(null)}>X Fechar</button>
            <button style={{ ...S.btn, background: '#27ae60', color: 'white', flex: 1 }} onClick={() => { const f = document.getElementById('coletivoFrame'); if (f && f.contentWindow) { f.contentWindow.focus(); f.contentWindow.print(); } }}>Salvar PDF ({coletivoHtml.n} prescricoes)</button>
          </div>
          <iframe id="coletivoFrame" srcDoc={coletivoHtml.html} style={{ flex: 1, border: 'none', width: '100%', background: '#fff' }} title="Coletivo" />
        </div>
      )}

      {escolhaPac && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 250, display: 'flex', alignItems: 'flex-end' }}
          onClick={() => setEscolhaPac(null)}>
          <div style={{ background: 'white', width: '100%', borderRadius: '16px 16px 0 0', padding: '16px 16px calc(16px + env(safe-area-inset-bottom, 0px))' }} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, color: '#1a3a5c', marginBottom: 12, fontSize: 15 }}>{escolhaPac.nome}</div>
            {(() => {
              const avsE = avaliacoes[escolhaPac.id] || [];
              const jaHoje = avsE.find(a => dataLocalISO(a.data) === dataLocalISO());
              return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <button style={{ ...S.btn, background: '#1a3a5c', color: 'white', width: '100%', padding: 13 }}
                    onClick={() => { const p = escolhaPac; setEscolhaPac(null); setModoConsulta(false); setPacAtual(p); if (jaHoje) { setAvAtual(jaHoje); setAvSnapshot(JSON.stringify(jaHoje)); setView('roteiro'); } else { novaAvaliacao(p); } }}>
                    📝 {jaHoje ? 'Continuar a evolução de hoje' : 'Nova evolução (hoje)'}</button>
                  <button style={{ ...S.btn, background: 'white', color: '#1a3a5c', border: '1.5px solid #1a3a5c', width: '100%', padding: 13 }}
                    onClick={() => { const p = escolhaPac; setEscolhaPac(null); abrirPaciente(p); }}>✎ Abrir ficha (edição)</button>
                  <button style={{ ...S.btn, background: 'white', color: '#555', border: '1px solid #ccc', width: '100%', padding: 13 }}
                    onClick={() => { const p = escolhaPac; setEscolhaPac(null); setModoConsulta(true); setPacAtual(p); setTab('info'); setView('paciente'); }}>👁 Só consultar (sem edição)</button>
                  <button style={{ ...S.btn, background: '#f1f1ee', color: '#888', width: '100%', padding: 12 }}
                    onClick={() => setEscolhaPac(null)}>✕ Nenhum</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {caixaRel && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200, display: 'flex', alignItems: 'flex-end' }}
          onClick={() => setCaixaRel(null)}>
          <div style={{ background: 'white', width: '100%', maxHeight: '88vh', overflowY: 'auto', borderRadius: '16px 16px 0 0', padding: 16 }} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, color: '#1a3a5c', marginBottom: 8 }}>📬 Caixa de relatórios</div>
            {!caixaRel.campos ? (
              <>
                <textarea value={caixaRel.raw} onChange={e => setCaixaRel({ ...caixaRel, raw: e.target.value })}
                  placeholder="Cole o relatório do grupo assim que chegar — a qualquer hora. O app guarda e te lembra amanhã." rows={9}
                  style={{ width: '100%', boxSizing: 'border-box', border: '1px solid #ddd', borderRadius: 10, padding: 10, fontSize: 13 }} />
                <button style={{ ...S.btn, background: '#1a3a5c', color: 'white', width: '100%', marginTop: 8 }}
                  onClick={() => {
                    const c = parseRelEnf(caixaRel.raw);
                    const match = pacientes.find(p => !infoHD[p.id]?.arquivado && c.nome && (nrmNome(p.nome) === nrmNome(c.nome) || nomeContido(p.nome, c.nome)));
                    setCaixaRel({ ...caixaRel, campos: c, pacId: match ? match.id : null });
                  }}>Analisar</button>
              </>
            ) : (() => {
              const c = caixaRel.campos;
              const alertas = verificarRelEnf(c);
              const pac = pacientes.find(p => p.id === caixaRel.pacId);
              let divergencia = null;
              if (pac) {
                const avsP = avaliacoes[pac.id] || [];
                const dataISO = c.data ? c.data.split('/').reverse().join('-') : null;
                const presc = avsP.find(a => a.conduta === 'hd_hoje' && (!dataISO || dataLocalISO(a.data) === dataISO)) || avsP.find(a => a.conduta === 'hd_hoje');
                if (presc) {
                  const ufPresc = (parseFloat(presc.uf_hd) || 0) + (parseFloat(presc.uf_isolada) || 0);
                  const ufObt = parseFloat(c.ufEfetiva);
                  const tPresc = durHoras(presc.hd_dur || presc.hd_horas);
                  const tObt = durHoras(c.durCalc || c.tempo);
                  const difs = [];
                  if (ufPresc && !isNaN(ufObt) && ufObt < ufPresc - 100) difs.push(`UF obtida ${ufObt} < prescrita ${ufPresc} ml`);
                  if (tPresc && tObt && tObt < tPresc - 0.2) difs.push(`tempo ${c.durCalc || c.tempo} < prescrito ${presc.hd_dur || presc.hd_horas}`);
                  if (difs.length) divergencia = difs.join(' · ');
                }
              }
              return (
                <>
                  <div style={{ fontSize: 13.5, marginBottom: 8 }}>
                    <b>{c.nome || 'Paciente não identificado'}</b> · {c.data || 'sem data'} · {c.tempo || c.durCalc || '?'}h · UF efetiva {c.ufEfetiva || '?'} / total {c.ufTotal || '?'} ml
                  </div>
                  {alertas.map((a, i) => (
                    <div key={i} style={{ padding: '7px 10px', borderRadius: 8, marginBottom: 6, fontSize: 12,
                      background: a.n === 'erro' ? '#fdecea' : a.n === 'aviso' ? '#fdf6ec' : '#eef4fb',
                      border: `1px solid ${a.n === 'erro' ? '#c0392b' : a.n === 'aviso' ? '#e8cfa8' : '#b9d2ee'}`,
                      color: a.n === 'erro' ? '#c0392b' : a.n === 'aviso' ? '#8a6d3b' : '#1a3a5c' }}>
                      {a.n === 'erro' ? '✗ ' : a.n === 'aviso' ? '⚠ ' : '📝 '}{a.m}
                    </div>
                  ))}
                  {divergencia && (
                    <div style={{ padding: '7px 10px', borderRadius: 8, marginBottom: 6, fontSize: 12, background: '#fdf6ec', border: '1px solid #e8cfa8', color: '#8a6d3b' }}>
                      ⚠ Sessão aquém do prescrito: {divergencia} — ficará grifado na lista (sem ação obrigatória).
                    </div>
                  )}
                  <div style={{ fontSize: 11, color: '#999', margin: '8px 0 4px' }}>{pac ? 'PACIENTE IDENTIFICADO:' : 'NÃO ACHEI O NOME NA LISTA — toque no paciente correto:'}</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
                    {(pac ? [pac] : pacientes.filter(p => !infoHD[p.id]?.arquivado)).map(p => (
                      <span key={p.id} style={{ ...S.checkItem, fontSize: 12, ...(caixaRel.pacId === p.id ? { background: '#1a3a5c', color: 'white', borderColor: '#1a3a5c' } : {}) }}
                        onClick={() => setCaixaRel({ ...caixaRel, pacId: caixaRel.pacId === p.id ? null : p.id })}>{p.nome}</span>
                    ))}
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button style={{ ...S.btn, background: '#f0f0f0', flex: 1 }} onClick={() => setCaixaRel(null)}>Cancelar</button>
                    <button style={{ ...S.btn, background: caixaRel.pacId ? '#27ae60' : '#cfd8cf', color: 'white', flex: 2 }}
                      onClick={() => {
                        if (!caixaRel.pacId) return;
                        const novoRel = { id: 'rel_' + Date.now(), criadoEm: Date.now(), campos: c, raw: caixaRel.raw, usadoEm: null, divergencia: divergencia || null };
                        let nomeNovo = null;
                        if (pac && c.nome && nomeContido(pac.nome, c.nome) && nrmNome(pac.nome) !== nrmNome(c.nome)
                          && confirm(`O cadastro está "${pac.nome}" e o relatório traz "${c.nome.trim()}". Completar o nome do cadastro?`)) nomeNovo = c.nome.trim();
                        setPacientes(ps => ps.map(p => p.id === caixaRel.pacId ? { ...p, ...(nomeNovo ? { nome: nomeNovo } : {}), relEnf: [novoRel, ...(p.relEnf || [])].slice(0, 10), updatedAt: Date.now() } : p));
                        setCaixaRel(null);
                      }}>✓ Guardar na caixa do paciente</button>
                  </div>
                </>
              );
            })()}
          </div>
        </div>
      )}

      {modoExcluir && (
        <div style={{ margin: '10px 16px 0', padding: '10px 14px', borderRadius: 10, background: '#fdf0ef', border: '1.5px solid #c0392b', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ flex: 1, fontSize: 13, color: '#c0392b', fontWeight: 700 }}>Toque nos pacientes a excluir ({selExcluir.length})</span>
          <span onClick={() => { setModoExcluir(false); setSelExcluir([]); }} style={{ ...S.checkItem, fontSize: 12 }}>Cancelar</span>
          <span onClick={() => {
            if (!selExcluir.length) return;
            const nomes = pacientes.filter(p => selExcluir.includes(p.id)).map(p => p.nome).join(', ');
            if (!confirm(`Excluir ${selExcluir.length} paciente(s)?\n${nomes}`)) return;
            if (!confirm('Tem certeza? Todas as evoluções destes pacientes serão apagadas. Esta ação NÃO pode ser desfeita.')) return;
            setPacientes(ps => ps.filter(p => !selExcluir.includes(p.id)));
            setAvaliacoes(av => { const novo = { ...av }; selExcluir.forEach(id => delete novo[id]); return novo; });
            setModoExcluir(false); setSelExcluir([]);
          }} style={{ ...S.checkItem, fontSize: 12, background: selExcluir.length ? '#c0392b' : '#e8b4ae', color: 'white', borderColor: 'transparent' }}>Excluir ({selExcluir.length})</span>
        </div>
      )}

      <div style={{ ...S.card, marginTop: 16 }}>
        {pacientes.length === 0
          ? <div style={S.emptyState}><div style={{ fontSize: 48 }}>🏥</div><p>Nenhum paciente</p></div>
          : (() => { const ativos = pacientes.filter(p => modoExcluir || !infoHD[p.id]?.arquivado);
            const porData = buscaData ? ativos.filter(p => (avaliacoes[p.id] || []).some(a => dataLocalISO(a.data) === buscaData)) : ativos;
            const vis = filtroHD ? porData.filter(p => infoHD[p.id]?.motivo || infoHD[p.id]?.prioridadeOntem) : porData;
            const pert = (p, u) => u === '__EXT__' ? !!p.externo : (!p.externo && (p.uti || '') === u);
            return [...UTIs, '', '__EXT__'].filter(u => vis.some(p => pert(p, u))).map(u => (
            <div key={u || 'sem-uti'}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 16px', background: '#f7f7f4', borderBottom: '1px solid #eee' }}>
                <span style={{ width: 12, height: 12, borderRadius: '50%', background: CORES_UTI[u] || '#bbb', border: '1px solid rgba(0,0,0,0.25)', display: 'inline-block' }}></span>
                <span style={{ fontSize: 13, fontWeight: 700, color: '#555' }} onClick={() => { if (u === '__EXT__') setExtAberto(x => !x); }}>{u === '__EXT__' ? `🏥 Fora do HRA (${vis.filter(p => pert(p, u)).length}) ${extAberto ? '▾' : '▸'}` : u ? `UTI ${u}` : 'Sem UTI'}</span>
              </div>
              {(u !== '__EXT__' || extAberto) && vis.filter(p => pert(p, u)).map(p => (
            <div key={p.id}
              style={{ ...S.patientItem, background: TINTAS_UTI[p.uti] || '#f7f7f4', ...(infoHD[p.id]?.vistoHoje ? { background: '#e4e4e0', opacity: 0.75 } : {}), ...(modoExcluir && selExcluir.includes(p.id) ? { background: '#fdecea' } : {}) }}
              onClick={() => modoExcluir ? setSelExcluir(s => s.includes(p.id) ? s.filter(x => x !== p.id) : [...s, p.id]) : setEscolhaPac(p)}>
              {modoExcluir && <span style={{ marginRight: 10, fontSize: 18, color: selExcluir.includes(p.id) ? '#c0392b' : '#ccc' }}>{selExcluir.includes(p.id) ? '☑' : '☐'}</span>}
              <div style={{ flex: 1 }}>
                <div style={S.patientName}>{infoHD[p.id]?.vistoHoje ? '✓ ' : ''}{p.nome}</div>
                <div style={S.patientMeta}>
                  {p.externo && p.externoLocal ? `${p.externoLocal} · ` : ''}{p.leito && `Leito ${p.leito} · `}{p.status || ''}
                </div>
                <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 3 }}>
                  {infoHD[p.id]?.prioridadeOntem && <span style={{ fontSize: 10.5, fontWeight: 700, color: 'white', background: '#c0392b', borderRadius: 6, padding: '2px 7px' }}>⚠ PRIORIDADE ONTEM</span>}
                  {infoHD[p.id]?.motivo && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#c0392b', background: '#fdf0ef', border: '1px solid #f0c2bd', borderRadius: 6, padding: '2px 7px' }}>💧 {infoHD[p.id].motivo}</span>}
                  {infoHD[p.id]?.suspensa && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#666', background: '#eee', borderRadius: 6, padding: '2px 7px' }}>HD SUSPENSA ATÉ 2ª ORDEM</span>}
                  {infoHD[p.id]?.homonimo && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#7a4a1e', background: '#fdf6f0', border: '1px solid #ecd5c0', borderRadius: 6, padding: '2px 7px' }}>⚠ HOMÔNIMO — verificar duplicado</span>}
                  {infoHD[p.id]?.relPendente && !infoHD[p.id]?.relDivergente && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#1a3a5c', background: '#eef4fb', border: '1px solid #b9d2ee', borderRadius: 6, padding: '2px 7px' }}>📬 relatório da enfermagem</span>}
                  {infoHD[p.id]?.relDivergente && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#8a6d3b', background: '#fdf6ec', border: '1px solid #e8cfa8', borderRadius: 6, padding: '2px 7px' }}>📬⚠ sessão aquém do prescrito</span>}
                  {infoHD[p.id]?.faltaRelatorio && <span style={{ fontSize: 10.5, fontWeight: 700, color: '#888', background: '#f4f4f0', border: '1px dashed #ccc', borderRadius: 6, padding: '2px 7px' }}>📭 sem relatório da última HD</span>}
                </div>
              </div>
              <Badge conduta={p.ultimaAvaliacao?.conduta} />
              <span style={{ marginLeft: 8, color: '#ccc', fontSize: 20 }}>›</span>
            </div>
              ))}
            </div>
          )); })()
        }
      </div>

      {(() => {
        const arq = pacientes.filter(p => infoHD[p.id]?.arquivado);
        if (!arq.length) return null;
        const ROT = { alta_nefro: 'Alta da nefro', alta_hosp: 'Alta hospitalar', paliativo: 'Paliativo', obito: 'Óbito' };
        return (
          <div style={{ ...S.card, marginTop: 10, opacity: 0.85 }}>
            <div onClick={() => setVerArquivados(v => !v)}
              style={{ padding: '10px 16px', background: '#f1f1ee', fontSize: 13, fontWeight: 700, color: '#777', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }}>
              <span>🗂 Fora do seguimento ({arq.length})</span>
              <span>{verArquivados ? '▲' : '▼'}</span>
            </div>
            {verArquivados && arq.map(p => (
              <div key={p.id} style={{ ...S.patientItem, cursor: 'default' }}>
                <div style={{ flex: 1 }} onClick={() => abrirPaciente(p)}>
                  <div style={{ ...S.patientName, color: '#888' }}>{p.nome}</div>
                  <div style={S.patientMeta}>{ROT[infoHD[p.id].conclusaoFinal] || ''}</div>
                </div>
                <span onClick={() => { setPacientes(ps => ps.map(x => x.id === p.id ? { ...x, reativadoEm: Date.now() } : x)); }}
                  style={{ ...S.checkItem, fontSize: 12, color: '#27ae60', borderColor: '#27ae60' }}>↩ Reativar</span>
              </div>
            ))}
          </div>
        );
      })()}
      <div style={{ marginTop: 18, padding: '0 16px 30px' }}>
        <div onClick={() => setVerDados(v => !v)} style={{ fontSize: 12, color: '#999', cursor: 'pointer', textAlign: 'center', padding: 8 }}>
          ⚙ Backup e dados {verDados ? '▲' : '▼'}
        </div>
        {verDados && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, maxWidth: 420, margin: '0 auto' }}>
            <button onClick={exportarDados}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              ⬆ Exportar backup
            </button>
            <label style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              ⬇ Importar
              <input type="file" accept="application/json,.json" style={{ display: 'none' }}
                onChange={e => { if (e.target.files[0]) importarDados(e.target.files[0]); e.target.value = ''; }} />
            </label>
            <button onClick={gerarResumoExternos}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              📱 Resumo externos (WhatsApp)
            </button>
            <button onClick={() => setView('pep')}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              📄 Evoluções p/ PEP
            </button>
            <button onClick={gerarColetivoDia}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              Prescricoes do dia (PDF p/ assinar)
            </button>
            <button onClick={() => setView('stats')}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #ddd', background: 'white', color: '#555', cursor: 'pointer', textAlign: 'center' }}>
              📊 Relatório
            </button>
            <button onClick={() => { setModoExcluir(true); setSelExcluir([]); setVerDados(false); }}
              style={{ fontSize: 12, padding: '10px 6px', borderRadius: 8, border: '1px solid #e8c8c4', background: 'white', color: '#c0392b', cursor: 'pointer', textAlign: 'center' }}>
              🗑 Excluir pacientes…
            </button>
          </div>
        )}
      </div>

      {modalPaciente}
    </div>
  );

  if (view === 'paciente') {

          {(avAtual.ultima_hd_data || avAtual.tempo_obtido || avAtual.uf_obtida) && (
<Bloco ir="roteiro" titulo="Última HD">
            <Item k="1ª HD" v={pacAtual.dataPrimeiraHD} />
            <Item k="Data da sessão" v={avAtual.ultima_hd_data} />
            <Item k="Acesso" v={avAtual.acesso} />
            <Item k="Sessão" v={avAtual.hd_destino === 'conforme' ? 'conforme prescrito' : avAtual.hd_destino === 'cancelada' ? 'não realizada' + (avAtual.hd_canc_motivo ? ' — ' + avAtual.hd_canc_motivo : '') : avAtual.hd_destino === 'parcial' ? 'parcial' + (avAtual.hd_parcial_motivo ? ' — ' + avAtual.hd_parcial_motivo : '') : ''} />
            <Item k="Tempo obtido" v={avAtual.tempo_obtido ? `${avAtual.tempo_obtido}h` : ''} />
            <Item k="UF obtida" v={avAtual.uf_obtida ? `${avAtual.uf_obtida} ml` : ''} />
            <Item k="Anticoagulação" v={avAtual.anticoag_hd} />
            <Item k="Intercorrências" v={(Array.isArray(avAtual.interc) ? avAtual.interc : []).join(', ')} />
          </Bloco>
          )}

          {(avAtual.med_revisar || []).length > 0 && (
            <Bloco ir="conduta" titulo="Medicamentos a revisar">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {avAtual.med_revisar.map(m => <span key={m} style={{ ...S.badge, background: '#c0392b' }}>{m}</span>)}
              </div>
            </Bloco>
          )}

          <div style={{ ...S.card, marginBottom: 12, border: '2px solid #1a3a5c' }}>
            <div style={{ ...S.cardHeader, background: '#1a3a5c', color: 'white' }}>Conduta</div>
            <div style={{ padding: 14, fontSize: 14, lineHeight: 1.7 }}>
              <Item k="Decisão" v={{ hd_hoje: 'HD HOJE', hd_amanha: 'HD AMANHÃ', conservador: 'CONSERVADOR' }[avAtual.conduta]} />
              {avAtual.conduta === 'hd_hoje' && (
                <div style={{ marginTop: 4 }}>
                  {avAtual.prioridade === 'sim' && <div style={{ color: '#c0392b', fontWeight: 700 }}>⚠ Sessão URGENTE</div>}
                  <Item k="Duração" v={(avAtual.hd_dur || avAtual.hd_horas) ? `${avAtual.hd_dur || avAtual.hd_horas}h` : ''} />
                  <Item k="Fluxos" v={`${avAtual.fluxo_sangue || '200'} / ${avAtual.fluxo_banho || '300'}`} />
                  <Item k="UF efetiva" v={((num(avAtual.uf_hd) || 0) + (num(avAtual.uf_isolada) || 0)) + ' ml'} />
                </div>
              )}
              <Item k="Conclusão" v={{ acompanhamento: 'Segue em acompanhamento', alta_nefro: 'Alta da nefrologia', alta_hosp: 'Alta hospitalar', paliativo: 'Cuidados paliativos', obito: 'Óbito' }[avAtual.conclusao]} />
            </div>
          </div>
        </div>

        <div style={S.bottomActions}>
          <button style={{ ...S.btn, background: '#f0f0f0', flex: '0 0 auto', padding: '12px 14px' }} onClick={() => setView('roteiro')}>‹</button>
          <button style={{ ...S.btn, background: copiado ? '#1a3a5c' : '#27ae60', color: 'white' }} onClick={copiarPanorama}>
            {copiado ? '✓ Copiado' : '📋 Copiar p/ prontuário'}
          </button>
          {avAtual.conduta?.startsWith('hd') && (
            <button style={{ ...S.btn, background: '#c0392b', color: 'white' }} onClick={() => setView('prescricao')}>Prescrição</button>
          )}
        </div>

        <RodapeNav direita="Voltar ▸" onDireita={() => setView('paciente')} />
      </div>
    );
  }

  return <div style={{ padding: 40, textAlign: 'center', color: '#888' }}>Carregando...</div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NefroApp />);
</script>
</body>
</html>
